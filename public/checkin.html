<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Anchor Point — 仓库签到</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#0F2B5B;--sky:#4A90D9;--sky-light:#E8F0FE;--green:#2D9D78;--red:#E63946;--orange:#F5A623;--white:#fff;--off:#F7F8FA;--gray-200:#e2e5ea;--gray-400:#9BA3B0;--gray-600:#5F6B7A;--gray-800:#2D3748;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--blue);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1rem}
.wrap{width:100%;max-width:420px;margin-top:2rem}
.logo-area{text-align:center;margin-bottom:1.5rem}
.logo-area img{width:48px;height:auto;margin-bottom:.5rem}
.logo-area h1{color:#fff;font-size:1.2rem;font-weight:700}
.logo-area p{color:rgba(255,255,255,.6);font-size:.78rem;margin-top:.2rem}
.site-name{color:rgba(255,255,255,.85);font-size:.9rem;margin-top:.35rem;font-weight:600}
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:0 8px 40px rgba(0,0,0,.28)}
.card h2{font-size:.95rem;color:var(--blue);margin-bottom:1rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--sky);color:#fff;font-size:.72rem;font-weight:700}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.72rem;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;padding:13px 15px;border:2px solid var(--gray-200);border-radius:10px;font-size:1rem;outline:none;font-family:inherit;transition:border .2s}
.field input:focus{border-color:var(--sky)}
.field input:disabled{background:#f3f3f3;color:var(--gray-400)}
.phone-row{display:flex;gap:.5rem}
.phone-row input{flex:1}
.phone-row .btn-code{flex-shrink:0;white-space:nowrap}
.btn{padding:13px 20px;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:.35rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--sky);color:#fff}
.btn-primary:hover:not(:disabled){background:#3A7BC8}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){background:#248A66}
.btn-code{padding:13px 14px;border:none;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;background:var(--sky);color:#fff;font-family:inherit;transition:all .2s}
.btn-code:disabled{opacity:.45;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:.85rem;text-align:center;display:none}
.msg.show{display:block}
.msg-err{background:#FFEAEA;color:var(--red);border:1px solid #FFC8C8}
.msg-ok{background:#E8F5E9;color:var(--green);border:1px solid #A8D5B5}
.msg-info{background:var(--sky-light);color:var(--blue);border:1px solid #B8D4F8}

.gps-bar{display:flex;align-items:center;gap:.5rem;font-size:.82rem;padding:.65rem .85rem;border-radius:8px;margin-bottom:.85rem;font-weight:600}
.gps-ok{background:#E8F5E9;color:var(--green);border:1px solid #A8D5B5}
.gps-fail{background:#FFEAEA;color:var(--red);border:1px solid #FFC8C8}
.gps-pending{background:var(--sky-light);color:var(--blue);border:1px solid #B8D4F8}

.photo-area{margin-bottom:.85rem}
.photo-preview{width:100%;max-height:300px;object-fit:cover;border-radius:10px;border:2px solid var(--gray-200);display:none}
.camera-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;border:2px dashed var(--gray-200);border-radius:10px;padding:2rem;cursor:pointer;color:var(--gray-400);transition:all .2s;position:relative;overflow:hidden}
.camera-btn:hover{border-color:var(--sky);color:var(--sky)}
.camera-btn.has-photo{border-style:solid;border-color:var(--green)}
.camera-btn .cam-icon{font-size:2rem}
.camera-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

.result-card{background:var(--off);border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:1rem}
.result-card h3{font-size:.85rem;color:var(--blue);margin-bottom:.6rem;font-weight:700}
.result-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--gray-200);font-size:.88rem}
.result-row:last-child{border:none}
.result-row span:first-child{color:var(--gray-600)}
.result-row span:last-child{font-weight:700;color:var(--gray-800)}
.check-icon{font-size:2.5rem;text-align:center;margin-bottom:.5rem}

.step{display:none}
.step.active{display:block}

.code-input{display:flex;gap:.4rem;justify-content:center;margin-bottom:.85rem}
.code-input input{width:44px;height:52px;text-align:center;font-size:1.3rem;font-weight:700;border:2px solid var(--gray-200);border-radius:8px;outline:none;font-family:inherit}
.code-input input:focus{border-color:var(--sky)}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.countdown{font-size:.78rem;color:var(--gray-400);text-align:center;margin-top:.3rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <img src="logo.svg" alt="Logo">
    <h1>Prime Anchor Point</h1>
    <p>仓库签到 / Warehouse Check-in</p>
    <div class="site-name" id="siteName">加载中...</div>
  </div>

  <!-- Step 1: Phone Input -->
  <div class="card step active" id="step1">
    <h2><span class="step-badge">1</span> 输入手机号</h2>
    <div id="msg1" class="msg"></div>
    <div class="field">
      <label>手机号码 / Phone Number</label>
      <div class="phone-row">
        <input type="tel" id="phoneInput" placeholder="(xxx) xxx-xxxx" maxlength="14" inputmode="tel" autocomplete="tel">
        <button class="btn-code" id="btnSendCode" onclick="sendCode()">发送验证码</button>
      </div>
    </div>
  </div>

  <!-- Step 2: Verify Code -->
  <div class="card step" id="step2">
    <h2><span class="step-badge">2</span> 输入验证码</h2>
    <div id="msg2" class="msg"></div>
    <p style="font-size:.82rem;color:var(--gray-600);margin-bottom:.75rem">验证码已发送至 <strong id="phoneDisplay"></strong></p>
    <div class="code-input" id="codeInputs">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="0">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="1">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="2">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="3">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="4">
      <input type="tel" maxlength="1" inputmode="numeric" data-idx="5">
    </div>
    <div class="countdown" id="countdown"></div>
    <button class="btn btn-primary" id="btnVerify" onclick="verifyCode()" disabled>验证 / Verify</button>
  </div>

  <!-- Step 3: GPS + Photo -->
  <div class="card step" id="step3">
    <h2><span class="step-badge">3</span> 定位 & 拍照</h2>
    <div id="msg3" class="msg"></div>
    <div class="gps-bar gps-pending" id="gpsBar">
      <span>📡</span> <span id="gpsText">GPS 定位中...</span>
    </div>
    <div class="photo-area" id="photoArea" style="display:none">
      <div class="camera-btn" id="cameraBtn">
        <div class="cam-icon">📷</div>
        <span>点击拍照 / Take Photo</span>
        <input type="file" accept="image/*" capture="environment" id="photoFile" onchange="handlePhoto(this)">
      </div>
      <img id="photoPreview" class="photo-preview" alt="Photo preview">
    </div>
    <button class="btn btn-green" id="btnPunch" onclick="submitPunch()" disabled>签到 / Check In</button>
  </div>

  <!-- Step 4: Result -->
  <div class="card step" id="step4">
    <h2><span class="step-badge">✓</span> 签到完成</h2>
    <div class="check-icon" id="resultIcon">✅</div>
    <div class="result-card">
      <h3 id="resultTitle">签到成功</h3>
      <div class="result-row"><span>姓名</span><span id="resName">-</span></div>
      <div class="result-row"><span>手机号</span><span id="resPhone">-</span></div>
      <div class="result-row"><span>员工号</span><span id="resEmpId">-</span></div>
      <div class="result-row"><span>时间</span><span id="resTime">-</span></div>
      <div class="result-row"><span>地点</span><span id="resSite">-</span></div>
    </div>
    <div id="msg4" class="msg msg-ok show">短信确认已发送至您的手机</div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const _siteId = params.get('site');
let _phone = '';
let _token = '';
let _empInfo = {};
let _gpsOk = false;
let _userLat = null;
let _userLng = null;
let _photoData = null;
let _countdownTimer = null;
let _siteLat = null;
let _siteLng = null;
let _siteRadius = 200;
let _gpsWatchId = null;
let _gpsBestAccuracy = 99999;

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg show msg-' + type;
  el.textContent = text;
}
function hideMsg(id) {
  const el = document.getElementById(id);
  el.className = 'msg';
}
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}

async function api(url, opts) {
  const r = await fetch(url, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || '请求失败');
  return d;
}

// Load site info
(async function() {
  if (!_siteId) {
    document.getElementById('siteName').textContent = '错误：缺少工作地点参数';
    return;
  }
  try {
    const d = await api('/api/checkin/site-info?site=' + _siteId);
    document.getElementById('siteName').textContent = d.name + (d.code ? ' (' + d.code + ')' : '');
    _siteLat = d.latitude;
    _siteLng = d.longitude;
    _siteRadius = d.radius_meters || 200;
  } catch (e) {
    document.getElementById('siteName').textContent = '无法加载工作地点信息';
  }
})();

// Phone formatting
const phoneInput = document.getElementById('phoneInput');
phoneInput.addEventListener('input', function() {
  let d = this.value.replace(/\D/g, '').slice(0, 10);
  if (d.length > 6) d = '(' + d.slice(0, 3) + ') ' + d.slice(3, 6) + '-' + d.slice(6);
  else if (d.length > 3) d = '(' + d.slice(0, 3) + ') ' + d.slice(3);
  this.value = d;
});
phoneInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendCode();
});

async function sendCode() {
  const raw = phoneInput.value.replace(/\D/g, '');
  if (raw.length < 10) return showMsg('msg1', '请输入有效的10位手机号码', 'err');
  hideMsg('msg1');
  const btn = document.getElementById('btnSendCode');
  btn.disabled = true;
  btn.textContent = '发送中...';
  try {
    await api('/api/checkin/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: raw, site_id: _siteId })
    });
    _phone = raw;
    document.getElementById('phoneDisplay').textContent = phoneInput.value;
    goStep(2);
    startCountdown(300);
    document.querySelector('#codeInputs input').focus();
  } catch (e) {
    showMsg('msg1', e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '发送验证码';
  }
}

// Code input handling
const codeBoxes = document.querySelectorAll('#codeInputs input');
codeBoxes.forEach((inp, i) => {
  inp.addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 1);
    if (this.value && i < 5) codeBoxes[i + 1].focus();
    checkCodeComplete();
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) {
      codeBoxes[i - 1].focus();
      codeBoxes[i - 1].value = '';
    }
    if (e.key === 'Enter') verifyCode();
  });
  inp.addEventListener('paste', function(e) {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
    for (let j = 0; j < text.length && j < 6; j++) codeBoxes[j].value = text[j];
    if (text.length > 0) codeBoxes[Math.min(text.length, 5)].focus();
    checkCodeComplete();
  });
});

function checkCodeComplete() {
  const code = Array.from(codeBoxes).map(b => b.value).join('');
  document.getElementById('btnVerify').disabled = code.length < 6;
}

function startCountdown(seconds) {
  let remaining = seconds;
  const el = document.getElementById('countdown');
  clearInterval(_countdownTimer);
  _countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(_countdownTimer);
      el.textContent = '验证码已过期，请返回重新获取';
      return;
    }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `验证码有效期：${m}:${String(s).padStart(2, '0')}`;
  }, 1000);
  el.textContent = `验证码有效期：${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, '0')}`;
}

async function verifyCode() {
  const code = Array.from(codeBoxes).map(b => b.value).join('');
  if (code.length < 6) return;
  hideMsg('msg2');
  const btn = document.getElementById('btnVerify');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 验证中...';
  try {
    const d = await api('/api/checkin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: _phone, code, site_id: _siteId })
    });
    _token = d.token;
    _empInfo = { name: d.name, employee_id: d.employee_id, phone: d.phone };
    clearInterval(_countdownTimer);
    goStep(3);
    startGPS();
  } catch (e) {
    showMsg('msg2', e.message, 'err');
    btn.disabled = false;
    btn.textContent = '验证 / Verify';
  }
}

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function startGPS() {
  const bar = document.getElementById('gpsBar');
  const txt = document.getElementById('gpsText');
  bar.className = 'gps-bar gps-pending';
  txt.textContent = 'GPS 卫星定位中... 请稍等';
  _gpsBestAccuracy = 99999;
  _gpsOk = false;
  hideMsg('msg3');

  if (!navigator.geolocation) {
    bar.className = 'gps-bar gps-fail';
    txt.textContent = '您的浏览器不支持GPS定位';
    return;
  }

  if (_gpsWatchId != null) navigator.geolocation.clearWatch(_gpsWatchId);

  const MAX_ACCURACY = 150; // max acceptable GPS accuracy in meters

  _gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      const acc = pos.coords.accuracy;
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      if (acc < _gpsBestAccuracy) {
        _gpsBestAccuracy = acc;
        _userLat = lat;
        _userLng = lng;
      }

      const bestAccStr = _gpsBestAccuracy >= 1000 ? (_gpsBestAccuracy / 1000).toFixed(1) + 'km' : Math.round(_gpsBestAccuracy) + 'm';

      if (_gpsBestAccuracy > MAX_ACCURACY) {
        bar.className = 'gps-bar gps-pending';
        txt.textContent = '定位精度不足（' + bestAccStr + '），请走到门口或窗户旁...';
        document.getElementById('photoArea').style.display = 'none';
        _gpsOk = false;
        updatePunchBtn();
        return;
      }

      if (_siteLat != null && _siteLng != null) {
        const dist = haversineDistance(_userLat, _userLng, _siteLat, _siteLng);
        const distStr = dist >= 1000 ? (dist / 1000).toFixed(1) + 'km' : Math.round(dist) + 'm';

        if (dist > _siteRadius) {
          _gpsOk = false;
          bar.className = 'gps-bar gps-fail';
          txt.textContent = '不在签到范围内（距离 ' + distStr + '，精度 ' + bestAccStr + '）';
          showMsg('msg3', '您不在工作地点范围内（距离约' + distStr + '），请到达工作地点后再签到', 'err');
          document.getElementById('photoArea').style.display = 'none';
          updatePunchBtn();
          return;
        }

        navigator.geolocation.clearWatch(_gpsWatchId);
        _gpsWatchId = null;
        _gpsOk = true;
        bar.className = 'gps-bar gps-ok';
        txt.textContent = '定位成功 ✓（距离 ' + distStr + '，精度 ' + bestAccStr + '）';
        hideMsg('msg3');
        document.getElementById('photoArea').style.display = '';
        updatePunchBtn();
      }
    },
    err => {
      bar.className = 'gps-bar gps-fail';
      if (err.code === 1) txt.textContent = '定位权限被拒绝，请在浏览器设置中开启定位';
      else if (err.code === 2) txt.textContent = '无法获取位置信息，请检查GPS是否开启';
      else txt.textContent = '定位超时，请重试';
      showMsg('msg3', '无法获取GPS定位，请开启手机定位后刷新页面', 'err');
    },
    { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
  );
}

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    _photoData = e.target.result;
    const preview = document.getElementById('photoPreview');
    preview.src = _photoData;
    preview.style.display = 'block';
    document.getElementById('cameraBtn').classList.add('has-photo');
    updatePunchBtn();
  };
  reader.readAsDataURL(file);
}

function updatePunchBtn() {
  document.getElementById('btnPunch').disabled = !(_gpsOk && _photoData);
}

async function submitPunch() {
  if (!_gpsOk || !_photoData) return;
  hideMsg('msg3');
  const btn = document.getElementById('btnPunch');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中...';

  try {
    const d = await api('/api/checkin/punch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        site_id: _siteId,
        phone: _phone,
        token: _token,
        latitude: _userLat,
        longitude: _userLng,
        accuracy: _gpsBestAccuracy,
        photo: _photoData
      })
    });

    const actionLabel = d.action === 'out' ? '签退成功 / Check-out Complete' : '签到成功 / Check-in Complete';
    document.getElementById('resultIcon').textContent = d.action === 'out' ? '👋' : '✅';
    document.getElementById('resultTitle').textContent = actionLabel;
    document.getElementById('resName').textContent = d.name || '-';
    document.getElementById('resPhone').textContent = _empInfo.phone || '-';
    document.getElementById('resEmpId').textContent = d.employee_id || '-';
    document.getElementById('resTime').textContent = d.clock_time || '-';
    const siteEl = document.getElementById('siteName');
    document.getElementById('resSite').textContent = siteEl.textContent || '-';

    goStep(4);
  } catch (e) {
    showMsg('msg3', e.message, 'err');
    btn.disabled = false;
    btn.textContent = '签到 / Check In';
  }
}
</script>
</body>
</html>
