<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>注册 — Prime Anchor Point</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#0ea5e9;--blue:#0F2B5B;--green:#22c55e;--red:#ef4444;--orange:#f97316;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-500:#64748b;--gray-700:#334155;--radius:10px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#f0f7ff 0%,#e0f0ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.wrap{width:100%;max-width:480px}
.logo{text-align:center;margin-bottom:1.5rem}
.logo img{height:56px;margin-bottom:.5rem}
.logo h1{font-size:1.4rem;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.logo h1 span{color:var(--sky)}
.logo p{color:var(--gray-400);font-size:.83rem;margin-top:.2rem}
.card{background:#fff;border-radius:16px;padding:2rem;box-shadow:0 4px 24px rgba(14,165,233,.1)}

.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap input{flex:1;padding-right:2.5rem}
.pw-eye{position:absolute;right:.6rem;background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0;line-height:1;color:var(--gray-400);opacity:.45}
.pw-eye:hover{opacity:1}
.lang-switcher{display:flex;gap:.3rem;justify-content:flex-end;margin-bottom:.75rem}
.lang-btn{background:none;border:1px solid var(--gray-200);border-radius:20px;padding:.22rem .75rem;font-size:.75rem;font-weight:600;color:var(--gray-500);cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--sky);color:var(--sky)}
.lang-btn.active{background:var(--sky);color:#fff;border-color:var(--sky)}

.type-selector{display:flex;gap:.75rem;margin-bottom:1.5rem}
.type-btn{flex:1;padding:1rem;border:2px solid var(--gray-200);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.type-btn:hover{border-color:var(--sky);background:#f0f9ff}
.type-btn.active{border-color:var(--sky);background:#eff6ff;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
.type-icon{font-size:2rem;margin-bottom:.35rem}
.type-label{font-size:.95rem;font-weight:700;color:var(--blue)}
.type-desc{font-size:.75rem;color:var(--gray-400);margin-top:.15rem}

.form-section{display:none}
.form-section.active{display:block}
h2{font-size:1rem;font-weight:700;color:var(--blue);margin-bottom:1.2rem;display:flex;align-items:center;gap:.4rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--gray-500);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;padding:.65rem .85rem;border:1px solid var(--gray-200);border-radius:8px;font-size:.92rem;transition:border .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--sky);border-color:transparent}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:flex;gap:.75rem}
.field-row .field{flex:1}
.field-hint{font-size:.72rem;color:var(--gray-400);margin-top:.25rem}

.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .75rem;margin-top:.4rem;max-height:200px;overflow-y:auto;padding:.3rem 0}
.pos-check{display:flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:400;cursor:pointer;padding:.2rem 0}
.pos-check input{width:14px;height:14px}

.status-options{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
.status-opt{border:1px solid var(--gray-200);background:#fff;padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.status-opt:hover{border-color:var(--sky);background:#f0f9ff}
.status-opt.active{background:var(--sky);color:#fff;border-color:var(--sky)}

.btn{display:block;width:100%;padding:.85rem;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn-submit{background:var(--sky);color:#fff}
.btn-submit:hover{background:#0284c7}
.btn-submit:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}

.msg{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.msg-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.msg.show{display:block}

.success-screen{display:none;text-align:center;padding:1rem 0}
.success-icon{font-size:3rem;margin-bottom:.75rem}
.success-title{font-size:1.1rem;font-weight:700;color:var(--green);margin-bottom:.5rem}
.success-body{font-size:.88rem;color:var(--gray-500);line-height:1.6}

.login-links{text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--gray-400)}
.login-links a{color:var(--sky);text-decoration:none;font-weight:600}
.login-links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-switcher">
    <button class="lang-btn active" id="langZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="langEn" onclick="setLang('en')">English</button>
    <button class="lang-btn" id="langEs" onclick="setLang('es')">Español</button>
  </div>
  <div class="logo">
    <img src="/logo.svg" alt="Prime Anchor Point">
    <h1>Prime <span>Anchor</span>Point</h1>
    <p id="logoSubtitle"></p>
  </div>

  <div class="card" id="regCard">
    <div class="type-selector" id="typeSelector">
      <div class="type-btn active" id="typeWorker" onclick="selectType('worker')">
        <div class="type-icon">👷</div>
        <div class="type-label" id="typeWorkerLabel"></div>
        <div class="type-desc" id="typeWorkerDesc"></div>
      </div>
      <div class="type-btn" id="typeEnterprise" onclick="selectType('enterprise')">
        <div class="type-icon">🏢</div>
        <div class="type-label" id="typeEnterpriseLabel"></div>
        <div class="type-desc" id="typeEnterpriseDesc"></div>
      </div>
    </div>

    <div class="msg msg-error" id="errorMsg"></div>

    <!-- Worker Registration -->
    <div class="form-section active" id="formWorker">
      <h2 id="workerH2"></h2>

      <div class="field">
        <label id="lWName"></label>
        <input type="text" id="wName">
      </div>

      <div class="field-row">
        <div class="field">
          <label id="lWPhone"></label>
          <input type="tel" id="wPhone" onblur="checkDuplicate('phone')" autocomplete="tel">
          <div class="field-hint" id="dupPhone" style="color:var(--red);display:none"></div>
        </div>
        <div class="field">
          <label id="lWEmail"></label>
          <input type="email" id="wEmail" onblur="checkDuplicate('email')" autocomplete="new-email">
          <div class="field-hint" id="dupEmail" style="color:var(--red);display:none"></div>
        </div>
      </div>

      <div class="field">
        <label id="lWDob"></label>
        <input type="date" id="wDob">
      </div>

      <div class="field">
        <label id="lWStatus"></label>
        <div class="status-options" id="wStatusOptions"></div>
      </div>

      <div class="field">
        <label id="lWPos"></label>
        <div class="pos-grid" id="posGrid"></div>
        <div class="field-hint" id="hWPos"></div>
      </div>

      <div class="field">
        <label id="lWPwd"></label>
        <div class="pw-wrap">
          <input type="password" id="wPassword" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('wPassword',this)" tabindex="-1">&#128065;</button>
        </div>
      </div>

      <div class="field">
        <label id="lWPwd2"></label>
        <div class="pw-wrap">
          <input type="password" id="wPassword2" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('wPassword2',this)" tabindex="-1">&#128065;</button>
        </div>
      </div>

      <button class="btn btn-submit" id="btnRegW" onclick="registerWorker()"></button>
    </div>

    <!-- Enterprise Registration -->
    <div class="form-section" id="formEnterprise">
      <h2 id="enterpriseH2"></h2>

      <div style="display:block;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:.75rem 1rem;font-size:.85rem;color:#92400e;margin-bottom:1rem" id="approvalNotice"></div>

      <div class="field">
        <label id="lEPartner"></label>
        <select id="ePartner"></select>
        <div class="field-hint" id="hEPartner"></div>
      </div>

      <div class="field">
        <label id="lEName"></label>
        <input type="text" id="eName">
      </div>

      <div class="field">
        <label id="lEEin"></label>
        <input type="text" id="eEin" maxlength="10" oninput="formatEin(this)">
        <div class="field-hint" id="hEEin"></div>
      </div>

      <div class="field-row">
        <div class="field">
          <label id="lEContact"></label>
          <input type="text" id="eContact">
        </div>
        <div class="field">
          <label id="lEPhone"></label>
          <input type="tel" id="ePhone">
        </div>
      </div>

      <div class="field">
        <label id="lEEmail"></label>
        <input type="email" id="eEmail">
      </div>

      <div class="field">
        <label id="lEPos"></label>
        <div class="pos-grid" id="ePosGrid"></div>
        <div class="field-hint" id="hEPos"></div>
      </div>

      <div class="field">
        <label id="lENeeds"></label>
        <textarea id="eNeeds"></textarea>
      </div>

      <div class="field">
        <label id="lEPwd"></label>
        <input type="password" id="ePassword">
      </div>

      <div class="field">
        <label id="lEPwd2"></label>
        <input type="password" id="ePassword2">
      </div>

      <button class="btn btn-submit" id="btnRegE" onclick="registerEnterprise()"></button>
    </div>

    <!-- Step 1: Phone Verification -->
    <div id="workerVerifyPhone" style="display:none">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-size:2rem;margin-bottom:.5rem">📱</div>
        <h2 id="verifyPhoneTitle" style="color:var(--blue);margin:0 0 .5rem"></h2>
        <p id="verifyPhoneDesc" style="color:#666;font-size:.9rem"></p>
      </div>
      <div class="field">
        <label id="lVPhone"></label>
        <input type="text" id="vPhoneCode" maxlength="6" style="text-align:center;font-size:1.2rem;letter-spacing:.3rem" inputmode="numeric">
      </div>
      <div style="text-align:right;margin-top:-.5rem;margin-bottom:1rem">
        <a href="#" id="resendPhoneA" onclick="resendCode('phone');return false" style="font-size:.82rem;color:var(--sky)"></a>
      </div>
      <button class="btn btn-submit" id="btnVerifyPhone" onclick="verifyStep('phone')"></button>
      <p id="verifyPhoneHint" style="text-align:center;font-size:.82rem;color:#999;margin-top:.75rem"></p>
    </div>

    <!-- Step 2: Email Verification -->
    <div id="workerVerifyEmail" style="display:none">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-size:2rem;margin-bottom:.5rem">✉️</div>
        <h2 id="verifyEmailTitle" style="color:var(--blue);margin:0 0 .5rem"></h2>
        <p id="verifyEmailDesc" style="color:#666;font-size:.9rem"></p>
      </div>
      <div class="field">
        <label id="lVEmail"></label>
        <input type="text" id="vEmailCode" maxlength="6" style="text-align:center;font-size:1.2rem;letter-spacing:.3rem" inputmode="numeric">
      </div>
      <div style="text-align:right;margin-top:-.5rem;margin-bottom:1rem">
        <a href="#" id="resendEmailA" onclick="resendCode('email');return false" style="font-size:.82rem;color:var(--sky)"></a>
      </div>
      <button class="btn btn-submit" id="btnVerifyEmail" onclick="verifyStep('email')"></button>
      <p id="verifyEmailHint" style="text-align:center;font-size:.82rem;color:#999;margin-top:.75rem"></p>
    </div>

    <!-- Legacy combined verify (hidden, kept for fallback) -->
    <div id="workerVerify" style="display:none">
      <p id="verifyHint"></p>
    </div>

    <!-- Success screens -->
    <div class="success-screen" id="workerSuccess" style="display:none">
      <div class="success-icon">🎉</div>
      <div class="success-title" id="successWTitle"></div>
      <div class="success-body" id="successWBody"></div>
    </div>

    <div class="success-screen" id="enterpriseSuccess">
      <div class="success-icon">📨</div>
      <div class="success-title" id="successETitle"></div>
      <div class="success-body" id="successEBody"></div>
    </div>

    <div class="login-links" id="loginLinks"></div>
  </div>
</div>

function renderPositions() {
  const html = POSITIONS.map(p => {
    const label = _lang === 'zh' ? p.zh : _lang === 'en' ? p.en : p.es;
    return `<label class="pos-check"><input type="checkbox" value="${p.key}"> ${label}</label>`;
  }).join('');
  document.getElementById('posGrid').innerHTML = html;
  document.getElementById('ePosGrid').innerHTML = html;
}

  document.getElementById('wStatusOptions').innerHTML = STATUS_KEYS.map((sk, i) =>
    `<div class="status-opt${_selectedStatus === STATUS_VALS[i] ? ' active' : ''}" onclick="selectStatus('${STATUS_VALS[i]}')">${t(sk)}</div>`
  ).join('');

function renderPartnerDropdown(state) {
  // state: 'loading' | 'empty' | 'fail' | array of partners
  const sel = document.getElementById('ePartner');
  if (state === 'loading') {
    sel.innerHTML = `<option value="">${t('partnerLoading')}</option>`;
  } else if (state === 'empty') {
    sel.innerHTML = `<option value="">${t('partnerEmpty')}</option>`;
  } else if (state === 'fail') {
    sel.innerHTML = `<option value="">${t('partnerFail')}</option>`;
  } else if (Array.isArray(state)) {
    sel.innerHTML = `<option value="">${t('partnerPH')}</option>` +
      state.map(p => `<option value="${p.id}">${p.name}${p.industry ? ' · ' + p.industry : ''}</option>`).join('');
  }
}

async function checkDuplicate(field) {
  if (field === 'phone') {
    const val = document.getElementById('wPhone').value.trim();
    if (!val) return;
    try {
      const r = await fetch('/api/register/check?phone=' + encodeURIComponent(val.replace(/[\s\-()+]/g, '')));
      const d = await r.json();
      const el = document.getElementById('dupPhone');
      el.style.display = d.taken ? '' : 'none';
      el.textContent = d.taken ? t('dupPhone') : '';
      document.getElementById('wPhone').style.borderColor = d.taken ? 'var(--red)' : '';
    } catch {}
  } else if (field === 'email') {
    const val = document.getElementById('wEmail').value.trim();
    if (!val) return;
    try {
      const r = await fetch('/api/register/check?email=' + encodeURIComponent(val));
      const d = await r.json();
      const el = document.getElementById('dupEmail');
      el.style.display = d.taken ? '' : 'none';
      el.textContent = d.taken ? t('dupEmail') : '';
      document.getElementById('wEmail').style.borderColor = d.taken ? 'var(--red)' : '';
    } catch {}
  }
}

}

async function registerWorker() {
  hideError();
  const name  = document.getElementById('wName').value.trim();
  const phone = document.getElementById('wPhone').value.trim();
  const email = document.getElementById('wEmail').value.trim();
  const dob   = document.getElementById('wDob').value;
  const pwd   = document.getElementById('wPassword').value;
  const pwd2  = document.getElementById('wPassword2').value;

  if (!name)  return showError(t('errName'));
  if (!phone) return showError(t('errPhone'));
  if (!/^\d{10,11}$/.test(phone.replace(/[\s\-()]+/g, ''))) return showError(t('errPhoneFmt'));
  if (!email) return showError(t('errEmail'));
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError(t('errEmailFmt'));
  if (!dob)   return showError(t('errDob'));
  if (!_selectedStatus) return showError(t('errStatus'));
  if (!pwd || pwd.length < 6) return showError(t('errPwd'));
  if (pwd !== pwd2) return showError(t('errPwdMatch'));
  if (document.getElementById('dupPhone').style.display !== 'none') return showError(t('dupPhone'));
  if (document.getElementById('dupEmail').style.display !== 'none') return showError(t('dupEmail'));

  const interests = Array.from(document.querySelectorAll('#posGrid input:checked')).map(c => c.value);

  try {
    const r = await fetch('/api/register/worker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, email, dob, work_status: _selectedStatus, position_interests: interests, password: pwd })
    });
    const d = await r.json();
    if (!r.ok || d.error) return showError(d.error || 'Registration failed');
    _pendingAccountId = d.account_id;
    document.getElementById('formWorker').style.display = 'none';
    const ts = document.getElementById('typeSelector');
    if (ts) ts.style.display = 'none';
    document.getElementById('loginLinks').style.display = 'none';
    // Show phone step first, or email step if no phone needed
    if (d.needs_phone !== false) {
      document.getElementById('workerVerifyPhone').style.display = 'block';
    } else if (d.needs_email !== false) {
      document.getElementById('workerVerifyEmail').style.display = 'block';
    }
  } catch { showError(t('errNetwork')); }
}

// Keep old verifyWorker for backwards compat (no longer used)
function verifyWorker() { verifyStep('phone'); }

async function verifyStep(type) {
  hideError();
  const codeEl = document.getElementById(type === 'phone' ? 'vPhoneCode' : 'vEmailCode');
  const code = codeEl.value.trim();
  if (!code) return showError(t(type === 'phone' ? 'errPhoneCode' : 'errEmailCode'));
  const btn = document.getElementById(type === 'phone' ? 'btnVerifyPhone' : 'btnVerifyEmail');
  btn.disabled = true;
  try {
    const r = await fetch('/api/register/verify-step', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ account_id: _pendingAccountId, type, code })
    });
    const d = await r.json();
    btn.disabled = false;
    if (!r.ok || d.error) return showError(d.error || 'Verification failed');
    if (d.all_done) {
      // All verified — show success
      if (d.token) localStorage.setItem('pa_worker_token', d.token);
      document.getElementById('workerVerifyPhone').style.display = 'none';
      document.getElementById('workerVerifyEmail').style.display = 'none';
      document.getElementById('workerSuccess').style.display = 'block';
      setTimeout(() => { window.location.href = '/portal'; }, 2000);
    } else {
      // Move to next step
      document.getElementById('workerVerifyPhone').style.display = 'none';
      document.getElementById('workerVerifyEmail').style.display = 'none';
      const nextSteps = d.next_steps || [];
      if (nextSteps.includes('email')) {
        document.getElementById('vEmailCode').value = '';
        document.getElementById('workerVerifyEmail').style.display = 'block';
      } else if (nextSteps.includes('phone')) {
        document.getElementById('vPhoneCode').value = '';
        document.getElementById('workerVerifyPhone').style.display = 'block';
      }
    }
  } catch { btn.disabled = false; showError(t('errNetwork')); }
}

async function resendCode(type) {
  if (!_pendingAccountId) return;
  try {
    const r = await fetch('/api/register/resend-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ account_id: _pendingAccountId, type })
    });
    const d = await r.json();
    const hint = document.getElementById(type === 'phone' ? 'verifyPhoneHint' : 'verifyEmailHint');
    if (r.ok) {
      hint.textContent = t(type === 'phone' ? 'resendOkPhone' : 'resendOkEmail');
      setTimeout(() => { hint.textContent = t('verifyExpiry'); }, 3000);
    } else { showError(d.error || 'Failed to resend'); }
  } catch { showError(t('errNetwork')); }
}

async function registerEnterprise() {
  hideError();
  const partner_id   = document.getElementById('ePartner').value;
  const company_name = document.getElementById('eName').value.trim();
  const contact_name = document.getElementById('eContact').value.trim();
  const email        = document.getElementById('eEmail').value.trim();
  const phone        = document.getElementById('ePhone').value.trim();
  const ein          = document.getElementById('eEin').value.trim();
  const notes        = document.getElementById('eNeeds').value.trim();
  const pwd          = document.getElementById('ePassword').value;
  const pwd2         = document.getElementById('ePassword2').value;

  const position_needs = Array.from(document.querySelectorAll('#ePosGrid input:checked')).map(c => c.value);

  if (!partner_id)   return showError(t('errPartner'));
  if (!company_name) return showError(t('errCName'));
  if (!contact_name) return showError(t('errContact'));
  if (!email)        return showError(t('errEmail'));
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError(t('errEmailFmt'));
  if (phone && !/^\d{10,11}$/.test(phone.replace(/[\s\-()]+/g, ''))) return showError(t('errPhoneFmt'));
  if (ein && !/^\d{2}-\d{7}$/.test(ein)) return showError(t('errEinFmt'));
  if (!pwd || pwd.length < 6) return showError(t('errPwd'));
  if (pwd !== pwd2) return showError(t('errPwdMatch'));

  const posLabels = position_needs.map(k => {
    const p = POSITIONS.find(pp => pp.key === k);
    return p ? p.zh + '/' + p.en : k;
  });
  const staffing_needs = (posLabels.length ? '工种需求: ' + posLabels.join(', ') + '\n' : '') + notes;

  try {
    const r = await fetch('/api/register/enterprise', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company_name, contact_name, email, phone, ein, staffing_needs, password: pwd, partner_id })
    });
    const d = await r.json();
    if (!r.ok || d.error) return showError(d.error || 'Registration failed');
    document.getElementById('formEnterprise').style.display = 'none';
    const ts = document.getElementById('typeSelector');
    if (ts) ts.style.display = 'none';
    document.getElementById('loginLinks').style.display = 'none';
