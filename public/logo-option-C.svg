<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Option C: Geometric "PA" Monogram — Modern & Bold -->
  <defs>
    <linearGradient id="gC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2B5B"/>
      <stop offset="100%" stop-color="#2E5BA0"/>
    </linearGradient>
  </defs>
  <rect width="240" height="240" rx="40" fill="url(#gC)"/>
  <!-- Letter P (left) -->
  <path d="M60 190 L60 50 L110 50 Q140 50 140 80 Q140 110 110 110 L60 110"
        fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Letter A (right, triangular) -->
  <path d="M130 190 L165 60 L200 190"
        fill="none" stroke="#F5A623" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="142" y1="148" x2="188" y2="148" stroke="#F5A623" stroke-width="8" stroke-linecap="round"/>
  <!-- Small anchor dot at the A peak -->
  <circle cx="165" cy="52" r="6" fill="#4A90D9"/>
</svg>
