<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Manager 注册 — Prime Anchorpoint</title>
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#0F2B5B;--sky:#4A90D9;--green:#10B981;--red:#EF4444;--gray-100:#f1f5f9;--gray-200:#e2e5ea;--gray-400:#9BA3B0;--gray-600:#5F6B7A;--off-white:#F7F8FA;--white:#fff;--radius:12px;--shadow:0 4px 24px rgba(15,43,91,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--off-white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem}
.logo-wrap{margin-bottom:1.5rem;text-align:center}
.logo-wrap img{height:48px;margin-bottom:.4rem}
.logo-wrap h1{font-size:1.2rem;font-weight:700;color:var(--blue)}
.logo-wrap p{font-size:.82rem;color:var(--gray-400);margin-top:.2rem}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.75rem 1.5rem;width:100%;max-width:420px}
.step{display:none}.step.active{display:block}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--gray-600);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%;padding:.6rem .8rem;border:1px solid var(--gray-200);border-radius:8px;font-size:.92rem;font-family:inherit;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--sky)}
.btn{display:block;width:100%;padding:.7rem;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-sky{background:var(--sky);color:#fff}
.btn-outline{background:#fff;color:var(--sky);border:1.5px solid var(--sky)}
.err{display:none;color:var(--red);font-size:.82rem;margin-top:.5rem;text-align:center}
.err.show{display:block}
.ok{display:none;color:var(--green);font-size:.82rem;margin-top:.5rem;text-align:center}
.ok.show{display:block}
.contact-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.contact-tab{flex:1;padding:.45rem;border:1.5px solid var(--gray-200);border-radius:8px;background:#fff;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;color:var(--gray-600);transition:all .15s}
.contact-tab.active{border-color:var(--sky);color:var(--sky);background:#f0f7ff}
.role-badge{display:inline-block;padding:.25rem .8rem;border-radius:20px;font-size:.78rem;font-weight:700;background:#e0f2fe;color:#0369a1;margin-bottom:1rem}
.divider{height:1px;background:var(--gray-200);margin:1rem 0}
.success-icon{font-size:3rem;text-align:center;margin-bottom:.75rem}
</style>
</head>
<body>
<div class="logo-wrap">
  <img src="/logo.svg" alt="Prime Anchorpoint">
  <h1>Prime Anchorpoint</h1>
  <p>Manager 账户注册</p>
</div>

<div class="card">
  <!-- Step 0: invalid/loading -->
  <div class="step active" id="stepLoading">
    <p style="text-align:center;color:var(--gray-400);font-size:.9rem">验证邀请链接中...</p>
  </div>

  <!-- Step 1: fill info -->
  <div class="step" id="stepForm">
    <div id="inviteRoleBadge" class="role-badge"></div>
    <p style="font-size:.85rem;color:var(--gray-600);margin-bottom:1.25rem" id="inviteNote"></p>

    <div class="field">
      <label>显示名称 Display Name</label>
      <input type="text" id="fDisplayName" placeholder="例：张三 / John Smith" autocomplete="name">
    </div>
    <div class="field">
      <label>用户名 Username</label>
      <input type="text" id="fUsername" placeholder="登录用户名（英文）" autocomplete="username">
    </div>
    <div class="field">
      <label>密码 Password（至少6位）</label>
      <input type="password" id="fPassword" placeholder="设置密码" autocomplete="new-password">
    </div>

    <div class="divider"></div>
    <p style="font-size:.82rem;color:var(--gray-600);margin-bottom:.6rem">验证方式 Verify via:</p>
    <div class="contact-tabs">
      <div class="contact-tab active" id="tabPhone" onclick="setContactType('phone')">📱 手机号</div>
      <div class="contact-tab" id="tabEmail" onclick="setContactType('email')">✉️ 邮箱</div>
    </div>
    <div class="field" id="fieldPhone">
      <label>手机号 Phone</label>
      <input type="tel" id="fPhone" placeholder="+1 (555) 000-0000" autocomplete="tel">
    </div>
    <div class="field" id="fieldEmail" style="display:none">
      <label>邮箱 Email</label>
      <input type="email" id="fEmail" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="err" id="errForm"></div>
    <button class="btn btn-blue" onclick="submitForm()">发送验证码 Send Code</button>
  </div>

  <!-- Step 2: enter code -->
  <div class="step" id="stepCode">
    <p style="font-size:.88rem;color:var(--gray-600);margin-bottom:1rem" id="codeDesc"></p>
    <div class="field">
      <label>验证码 Verification Code</label>
      <input type="text" id="fCode" maxlength="6" placeholder="6位验证码" style="letter-spacing:3px;font-size:1.3rem;text-align:center" inputmode="numeric">
    </div>
    <div class="err" id="errCode"></div>
    <button class="btn btn-blue" onclick="submitCode()">完成注册 Complete</button>
    <button class="btn btn-outline" onclick="resendCode()" style="margin-top:.5rem">重新发送 Resend</button>
    <div class="ok" id="okResend">验证码已重新发送 Code resent</div>
  </div>

  <!-- Step 3: success -->
  <div class="step" id="stepDone">
    <div class="success-icon">✅</div>
    <h2 style="text-align:center;color:var(--blue);margin-bottom:.5rem">注册成功！</h2>
    <p style="text-align:center;font-size:.88rem;color:var(--gray-600);margin-bottom:1.25rem">您的 Manager 账户已开通，正在跳转...</p>
    <button class="btn btn-blue" onclick="goToAdmin()">前往登录 Go to Admin</button>
  </div>

  <!-- Invalid link -->
  <div class="step" id="stepInvalid">
    <p style="text-align:center;font-size:1.5rem;margin-bottom:.5rem">🔗</p>
    <h2 style="text-align:center;color:var(--red);margin-bottom:.5rem">链接无效</h2>
    <p style="text-align:center;font-size:.85rem;color:var(--gray-400)" id="invalidMsg">此邀请链接已失效或已被使用。请联系管理员重新获取。</p>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
let contactType = 'phone';
let inviteRole = 'manager';
let sessionToken = null;

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setContactType(t) {
  contactType = t;
  document.getElementById('tabPhone').classList.toggle('active', t === 'phone');
  document.getElementById('tabEmail').classList.toggle('active', t === 'email');
  document.getElementById('fieldPhone').style.display = t === 'phone' ? '' : 'none';
  document.getElementById('fieldEmail').style.display = t === 'email' ? '' : 'none';
}

async function init() {
  if (!token) { showStep('stepInvalid'); return; }
  try {
    const r = await fetch('/api/public/manager-invite/' + token);
    if (!r.ok) { showStep('stepInvalid'); return; }
    const d = await r.json();
    inviteRole = d.role || 'manager';
    const roleLabel = { admin: '🔑 Admin', staff: '👤 Staff', manager: '🏢 Manager' }[inviteRole] || inviteRole;
    document.getElementById('inviteRoleBadge').textContent = roleLabel + ' 账户邀请';
    document.getElementById('inviteNote').textContent = d.note || '您已被邀请注册账户，请填写以下信息完成注册。';
    showStep('stepForm');
  } catch { showStep('stepInvalid'); }
}

async function submitForm() {
  const display_name = document.getElementById('fDisplayName').value.trim();
  const username = document.getElementById('fUsername').value.trim();
  const password = document.getElementById('fPassword').value;
  const contact = contactType === 'phone'
    ? document.getElementById('fPhone').value.trim()
    : document.getElementById('fEmail').value.trim();
  const errEl = document.getElementById('errForm');
  errEl.className = 'err';

  if (!username || !password || !contact) { errEl.textContent = '请填写所有必填项'; errEl.className = 'err show'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少需要6位'; errEl.className = 'err show'; return; }

  try {
    const r = await fetch('/api/public/manager-register/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, contact, contact_type: contactType })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || '发送失败'; errEl.className = 'err show'; return; }
    const label = contactType === 'phone' ? contact : contact;
    document.getElementById('codeDesc').textContent = `验证码已发送至 ${label}，请在10分钟内输入。`;
    showStep('stepCode');
  } catch { errEl.textContent = '网络错误，请重试'; errEl.className = 'err show'; }
}

async function submitCode() {
  const code = document.getElementById('fCode').value.trim();
  const username = document.getElementById('fUsername').value.trim();
  const display_name = document.getElementById('fDisplayName').value.trim();
  const password = document.getElementById('fPassword').value;
  const contact = contactType === 'phone'
    ? document.getElementById('fPhone').value.trim()
    : document.getElementById('fEmail').value.trim();
  const errEl = document.getElementById('errCode');
  errEl.className = 'err';

  if (!code) { errEl.textContent = '请输入验证码'; errEl.className = 'err show'; return; }

  try {
    const r = await fetch('/api/public/manager-register/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, username, display_name, password, contact, contact_type: contactType, code })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || '注册失败'; errEl.className = 'err show'; return; }
    sessionToken = d.token;
    showStep('stepDone');
    setTimeout(goToAdmin, 2000);
  } catch { errEl.textContent = '网络错误，请重试'; errEl.className = 'err show'; }
}

async function resendCode() {
  const contact = contactType === 'phone'
    ? document.getElementById('fPhone').value.trim()
    : document.getElementById('fEmail').value.trim();
  await fetch('/api/public/manager-register/send-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, contact, contact_type: contactType })
  });
  const ok = document.getElementById('okResend');
  ok.className = 'ok show';
  setTimeout(() => { ok.className = 'ok'; }, 3000);
}

function goToAdmin() {
  if (sessionToken) {
    localStorage.setItem('adminToken', sessionToken);
  }
  location.href = '/admin';
}

init();
</script>
</body>
</html>
