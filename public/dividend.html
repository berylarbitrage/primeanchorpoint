<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待分红 — Prime Anchor Workforce</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#92400e;--sky:#b45309;--sky-light:#fef3c7;--accent:#f59e0b;--white:#fff;--off-white:#fffbeb;--gray-100:#f3f4f6;--gray-200:#e2e5ea;--gray-400:#9BA3B0;--gray-500:#6B7280;--gray-600:#5F6B7A;--gray-800:#2D3748;--red:#E63946;--green:#2D9D78;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--gray-800)}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--white);padding:3rem;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:1.3rem;color:var(--blue);margin-bottom:.5rem}
.login-box p{font-size:.85rem;color:var(--gray-400);margin-bottom:2rem}
.login-box input{width:100%;padding:12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:var(--sky)}
.login-box button{width:100%;padding:12px;background:var(--sky);color:#fff;border:none;border-radius:var(--radius);font-weight:700;cursor:pointer;font-size:.95rem}
.login-box button:hover{background:#92400e}
.login-box .err{color:var(--red);font-size:.82rem;margin-top:.5rem}
.login-box img.logo{width:80px;height:auto;margin-bottom:1rem}
.pass-wrap{position:relative;width:100%;margin-bottom:1rem}
.pass-wrap input{width:100%;margin-bottom:0;padding-right:44px}
.pass-wrap .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray-400);background:none;border:none;padding:4px;font-size:1rem;line-height:1;width:auto}
.pass-wrap .eye:hover{color:var(--gray-600)}

/* Layout */
.app{display:none}.app.show{display:flex;flex-direction:column;min-height:100vh}
.header{background:#fff;border-bottom:1.5px solid #fde68a;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:1.1rem;color:var(--sky);display:flex;align-items:center;gap:.5rem}
.header-actions{display:flex;align-items:center;gap:.75rem}
.header-user{font-size:.82rem;color:var(--gray-500)}
.main{padding:1.5rem 2rem;flex:1;max-width:1100px;margin:0 auto;width:100%}

/* Components */
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.top h1{font-size:1.5rem;color:var(--blue)}
.top-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.btn{padding:8px 20px;background:var(--sky);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:.82rem;transition:all .2s}
.btn:hover{background:var(--blue)}
.btn-red{background:var(--red)}.btn-red:hover{background:#c5303c}
.btn-green{background:var(--green)}.btn-green:hover{background:#1e7a5c}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#d9900e}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-outline{background:transparent;border:1px solid var(--gray-200);color:var(--gray-600)}.btn-outline:hover{background:var(--gray-200);color:var(--gray-800)}
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:.75rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-200);white-space:nowrap}
td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--gray-200);color:var(--gray-600)}
tr:hover td{background:var(--sky-light)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:700}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-yellow{background:#FEF3C7;color:#92400E}
.empty{text-align:center;padding:2rem;color:var(--gray-400)}

/* Toast */
#toast-wrap{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:.5rem;pointer-events:none}
.toast{background:#1e293b;color:#fff;padding:.75rem 1.4rem;border-radius:10px;font-size:.9rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transform:translateY(12px);transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.in{opacity:1;transform:translateY(0)}
.toast.success{background:#065F46;border-left:4px solid #34d399}
.toast.warning{background:#78350F;border-left:4px solid #fbbf24}
.toast.error{background:#991B1B;border-left:4px solid #f87171}

/* Responsive */
@media(max-width:640px){
  .main{padding:1rem}
  .top h1{font-size:1.2rem}
  table{font-size:.78rem}
  th,td{padding:6px 8px}
}
@media(max-width:480px){
  .main{padding:.75rem}
  .top{flex-direction:column;align-items:flex-start;gap:.5rem}
  .card{padding:1rem}
  table{font-size:.72rem}
  th,td{padding:5px 6px}
  .header{padding:.6rem 1rem}
  .header h1{font-size:.95rem}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
  <img src="logo.svg" class="logo" alt="Logo">
  <h1>Prime Anchor Workforce</h1>
  <p id="loginSubtitle">待分红</p>
  <input type="text" id="userInput" placeholder="用户名" autocomplete="username">
  <div class="pass-wrap">
    <input type="password" id="passInput" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="eye" type="button" onclick="togglePass()" title="显示/隐藏密码">👁</button>
  </div>
  <button id="loginBtn" onclick="doLogin()">登录</button>
  <div class="err" id="loginErr"></div>
</div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="header">
    <h1><img src="logo.svg" style="height:28px"> 待分红</h1>
    <div class="header-actions">
      <span class="header-user" id="headerUser"></span>
      <button class="btn btn-sm btn-outline" onclick="logout()">退出</button>
    </div>
  </div>
  <div class="main">
    <div class="top">
      <h1>🎯 待分红</h1>
      <div class="top-actions">
        <button class="btn btn-outline" onclick="loadDividend()">刷新</button>
      </div>
    </div>
    <p style="color:var(--gray-400);font-size:.85rem;margin-bottom:1rem">客户与劳务均已付款的工时单。全部 Staff 投票「无异议」后，再各自确认「已分红」即可归档至工时历史。</p>
    <div class="card">
      <table>
        <thead><tr><th>员工</th><th>公司</th><th>周期</th><th>总工时</th><th>无异议投票</th><th>已分红确认</th><th>操作</th></tr></thead>
        <tbody id="dividendTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
const API = '/api';
let TOKEN = '';
let USER_ROLE = '';
let USER_NAME = '';
let _currentUserId = 0;

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtPeriod(s, e) { if (!s) return ''; const fmt = d => d ? d.slice(5).replace('-','/') : ''; return `${fmt(s)} ~ ${fmt(e)}`; }

function showToast(msg, type = 'success', duration = 3000) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = msg;
  wrap.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('in')); });
  setTimeout(() => { t.classList.remove('in'); setTimeout(() => t.remove(), 300); }, duration);
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}`, ...(opts.headers || {}) }
  });
  const ct = res.headers.get('content-type') || '';
  if (!ct.includes('application/json')) return { error: '服务器返回异常' };
  const data = await res.json();
  if (res.status === 401) { alert('登录已过期，请重新登录'); logout(); return data; }
  if (res.status === 403) { alert('权限不足'); return data; }
  return data;
}

function togglePass() {
  const inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function logout() {
  TOKEN = ''; USER_ROLE = ''; USER_NAME = '';
  document.cookie = 'pa_token=;path=/;max-age=0';
  document.getElementById('loginWrap').style.display = '';
  document.getElementById('app').classList.remove('show');
}

function finishLogin(r) {
  const role = r.role || 'staff';
  if (role !== 'staff' && role !== 'admin') {
    document.getElementById('loginErr').textContent = '此页面仅限 Staff/Admin 账户登录';
    return;
  }
  TOKEN = r.token;
  USER_ROLE = role;
  USER_NAME = r.username || '';
  _currentUserId = r.user_id || 0;
  document.cookie = `pa_token=${TOKEN};path=/;max-age=2592000;SameSite=Strict`;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('headerUser').textContent = USER_NAME;
  loadDividend();
}

async function doLogin() {
  const username = document.getElementById('userInput').value.trim();
  const password = document.getElementById('passInput').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const r = await api('/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    if (r.success) { finishLogin(r); }
    else { errEl.textContent = '用户名或密码错误'; }
  } catch(e) { errEl.textContent = '网络错误'; }
  btn.disabled = false; btn.textContent = '登录';
}

// Auto-login from cookie
(function() {
  const m = document.cookie.match(/pa_token=([^;]+)/);
  if (m) {
    const cookieToken = m[1];
    TOKEN = cookieToken;
    document.getElementById('loginWrap').style.display = 'none';
    fetch(API + '/admin/me', { headers: { 'Authorization': `Bearer ${cookieToken}` } })
      .then(r => { if (r.ok) return r.json(); throw 0; })
      .then(u => {
        if (TOKEN !== cookieToken) return;
        const role = u.role || 'staff';
        if (role !== 'staff' && role !== 'admin') {
          TOKEN = '';
          document.cookie = 'pa_token=;path=/;max-age=0';
          document.getElementById('loginWrap').style.display = '';
          return;
        }
        USER_ROLE = role;
        USER_NAME = u.username || '';
        _currentUserId = u.id || 0;
        document.getElementById('app').classList.add('show');
        document.getElementById('headerUser').textContent = USER_NAME;
        loadDividend();
      })
      .catch(() => {
        TOKEN = '';
        document.cookie = 'pa_token=;path=/;max-age=0';
        document.getElementById('loginWrap').style.display = '';
      });
  }
})();

// ─── Dividend ───
async function loadDividend() {
  const tbody = document.getElementById('dividendTable');
  tbody.innerHTML = '<tr><td colspan="7" class="empty">加载中…</td></tr>';
  const rows = await api('/admin/timesheet-sheets?stage=dividend');
  if (!Array.isArray(rows) || !rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无待分红工时单</td></tr>';
    return;
  }
  const votesMap = {};
  await Promise.all(rows.map(async r => { votesMap[r.id] = await api(`/admin/timesheet-sheets/${r.id}/votes`); }));
  tbody.innerHTML = rows.map(r => {
    const name = `${r.last_name||''}${r.first_name||''} <span style="font-family:monospace;font-size:.72rem;color:var(--sky)">${r.emp_code||''}</span>`;
    const vi = votesMap[r.id] || { votes: [], staff_count: 0 };
    const approves = vi.votes.filter(v => v.vote_type === 'approve');
    const dists = vi.votes.filter(v => v.vote_type === 'distributed');
    const allApproved = approves.length >= vi.staff_count && vi.staff_count > 0;
    const myApproved = approves.some(v => v.user_id === _currentUserId);
    const myDistributed = dists.some(v => v.user_id === _currentUserId);
    const approveCell = `<span class="badge ${allApproved?'badge-green':'badge-yellow'}">${approves.length}/${vi.staff_count}</span>`
      + (approves.length ? `<div style="font-size:.7rem;color:var(--gray-400);margin-top:2px">${approves.map(v=>v.display_name||v.username).join(', ')}</div>` : '');
    const distCell = allApproved
      ? `<span class="badge ${dists.length>=vi.staff_count?'badge-green':'badge-yellow'}">${dists.length}/${vi.staff_count}</span>`
        + (dists.length ? `<div style="font-size:.7rem;color:var(--gray-400);margin-top:2px">${dists.map(v=>v.display_name||v.username).join(', ')}</div>` : '')
      : '<span style="font-size:.78rem;color:var(--gray-500)">等待全部无异议</span>';
    let actionBtn = '';
    if (!myApproved) {
      actionBtn = `<button class="btn btn-sm btn-green" onclick="voteDividendApprove(${r.id})">无异议</button>`;
    } else if (allApproved && !myDistributed) {
      actionBtn = `<button class="btn btn-sm btn-accent" onclick="voteDividendDistributed(${r.id})">已分红</button>`;
    } else if (myApproved && !allApproved) {
      actionBtn = '<span class="badge badge-green">已投票</span>';
    } else {
      actionBtn = '<span class="badge badge-green">已确认</span>';
    }
    return `<tr>
      <td>${name}</td>
      <td>${esc(r.company_name||'—')}</td>
      <td style="white-space:nowrap">${fmtPeriod(r.period_start,r.period_end)}</td>
      <td style="text-align:right">${(r.total_hours||0).toFixed(1)}h</td>
      <td>${approveCell}</td>
      <td>${distCell}</td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join('');
}

async function voteDividendApprove(id) {
  const r = await api(`/admin/timesheet-sheets/${id}/vote-approve`, { method:'POST', body:'{}' });
  if (r.error) { alert(r.error); return; }
  showToast(r.all_approved ? '✅ 全部无异议通过！可以确认分红' : `✅ 已投无异议 (${r.approve_count}/${r.staff_count})`);
  loadDividend();
}

async function voteDividendDistributed(id) {
  const r = await api(`/admin/timesheet-sheets/${id}/vote-distributed`, { method:'POST', body:'{}' });
  if (r.error) { alert(r.error); return; }
  showToast(r.all_distributed ? '✅ 全部确认分红，已归档至工时历史' : `✅ 已确认分红 (${r.dist_count}/${r.staff_count})`);
  loadDividend();
}
</script>
</body>
</html>
