<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工头管理 / Foremen</title>
<style>
  :root { --amber:#b45309; --amber-d:#92400e; --bg:#fffaf0; --line:#e7e0d2; --gray:#6b6256; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:#241f17; }
  .wrap { max-width:920px; margin:0 auto; padding:1.1rem; }
  .top { display:flex; align-items:center; justify-content:space-between; gap:.5rem; flex-wrap:wrap; }
  h1 { font-size:1.4rem; color:var(--amber-d); margin:.3rem 0; }
  a.back { color:var(--amber-d); font-size:.85rem; text-decoration:none; font-weight:700; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:1rem 1.1rem; margin:1rem 0; box-shadow:0 2px 10px rgba(0,0,0,.04); }
  .btn { padding:.5rem .9rem; border:none; border-radius:9px; background:var(--amber-d); color:#fff; font-size:.85rem; font-weight:700; cursor:pointer; }
  .btn-ghost { background:#fff; color:var(--amber-d); border:1.5px solid var(--amber-d); }
  .btn-sm { padding:.35rem .6rem; font-size:.78rem; border-radius:8px; }
  .btn-red { background:#fff; color:#dc2626; border:1.5px solid #fecaca; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th, td { text-align:left; padding:.55rem .5rem; border-bottom:1px solid #f0ead9; vertical-align:middle; }
  th { font-size:.74rem; color:var(--gray); text-transform:uppercase; letter-spacing:.04em; }
  .muted { color:var(--gray); font-size:.8rem; }
  .pill { display:inline-block; background:#fff3e0; color:var(--amber-d); border-radius:20px; padding:.15rem .6rem; font-size:.78rem; font-weight:700; }
  .actions { display:flex; gap:.35rem; flex-wrap:wrap; }
  .workers { background:#fbf7ee; border-radius:10px; padding:.5rem .7rem; margin:.3rem 0 .6rem; }
  .empty { text-align:center; color:var(--gray); padding:2rem; }
  /* modal */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); align-items:center; justify-content:center; z-index:100; padding:1rem; }
  .modal { background:#fff; border-radius:14px; padding:1.3rem; max-width:360px; width:100%; text-align:center; }
  .modal img { width:100%; max-width:300px; height:auto; }
  .modal .url { font-size:.74rem; color:var(--gray); word-break:break-all; margin:.6rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🦺 工头管理 / Foremen</h1>
    <a class="back" href="/admin">← 返回后台 / Back to Admin</a>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700">📇 工头登记二维码 / Foreman Registration QR</div>
        <div class="muted">把这个码发给工头，让他们扫码登记自己 / Share this so foremen can register themselves</div>
      </div>
      <button class="btn" onclick="showRegisterQr()">显示二维码 / Show QR</button>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:700;margin-bottom:.4rem">工头列表 / Foremen <span id="cnt" class="muted"></span></div>
    <div id="list"><div class="empty">加载中… / Loading…</div></div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div id="modalTitle" style="font-weight:700;color:var(--amber-d);margin-bottom:.6rem"></div>
    <img id="modalImg" alt="QR">
    <div class="url" id="modalUrl"></div>
    <button class="btn btn-ghost" onclick="closeModal()">关闭 / Close</button>
  </div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let foremen = [];

async function api(url, opts) {
  const r = await fetch(url, opts);
  if (r.status === 401) { location.href = '/admin'; throw new Error('unauth'); }
  return r;
}

async function load() {
  try {
    const r = await api('/api/admin/foremen');
    foremen = await r.json();
    render();
  } catch (e) { if (e.message !== 'unauth') document.getElementById('list').innerHTML = '<div class="empty">加载失败 / Failed to load</div>'; }
}

function render() {
  document.getElementById('cnt').textContent = '· 共 ' + foremen.length + ' 位';
  if (!foremen.length) { document.getElementById('list').innerHTML = '<div class="empty">还没有工头登记 / No foremen yet</div>'; return; }
  let html = '<table><thead><tr><th>姓名 Name</th><th>仓库 Warehouse</th><th>电话 Phone</th><th>工人 Workers</th><th></th></tr></thead><tbody>';
  for (const f of foremen) {
    html += `<tr>
      <td><b>${esc(f.name)}</b>${f.active ? '' : ' <span class="muted">(停用)</span>'}<br><span class="muted">${esc(f.email||'')}</span></td>
      <td>${esc(f.warehouse||'') || '<span class="muted">—</span>'}</td>
      <td>${esc(f.phone||'') || '<span class="muted">—</span>'}</td>
      <td><span class="pill">${f.worker_count} 人</span></td>
      <td><div class="actions">
        <button class="btn btn-sm btn-ghost" onclick="toggleWorkers(${f.id})">查看工人</button>
        <button class="btn btn-sm btn-ghost" onclick="showIntakeQr(${f.id},'${esc(f.name).replace(/'/g,"\\'")}')">录入码</button>
        <button class="btn btn-sm btn-red" onclick="delForeman(${f.id},'${esc(f.name).replace(/'/g,"\\'")}')">删除</button>
      </div></td>
    </tr>
    <tr id="wrow-${f.id}" style="display:none"><td colspan="5"><div class="workers" id="wbox-${f.id}"></div></td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('list').innerHTML = html;
}

async function toggleWorkers(id) {
  const row = document.getElementById('wrow-' + id);
  const box = document.getElementById('wbox-' + id);
  if (row.style.display !== 'none') { row.style.display = 'none'; return; }
  row.style.display = '';
  box.innerHTML = '加载中…';
  try {
    const r = await api('/api/admin/foremen/' + id + '/workers');
    const ws = await r.json();
    if (!ws.length) { box.innerHTML = '<span class="muted">该工头还没录入工人 / No workers yet</span>'; return; }
    let h = '<table><thead><tr><th>姓名</th><th>电话</th><th>语言</th><th>职位</th><th>时间</th><th></th></tr></thead><tbody>';
    for (const w of ws) {
      h += `<tr>
        <td><b>${esc(w.name)}</b>${w.email?'<br><span class="muted">'+esc(w.email)+'</span>':''}</td>
        <td>${esc(w.phone||'')||'<span class="muted">—</span>'}</td>
        <td>${esc(w.language||'')||'<span class="muted">—</span>'}</td>
        <td>${esc(w.position||'')||'<span class="muted">—</span>'}</td>
        <td class="muted">${esc((w.created_at||'').slice(0,16).replace('T',' '))}</td>
        <td><button class="btn btn-sm btn-red" onclick="delWorker(${w.id},${id})">删</button></td>
      </tr>`;
    }
    h += '</tbody></table>';
    box.innerHTML = h;
  } catch (e) { if (e.message !== 'unauth') box.innerHTML = '加载失败'; }
}

async function showRegisterQr() {
  try {
    const r = await api('/api/admin/foreman-register-qr');
    const d = await r.json();
    openModal('📇 工头登记二维码 / Foreman Registration', d.qr, d.url);
  } catch (e) {}
}
async function showIntakeQr(id, name) {
  try {
    const r = await api('/api/admin/foremen/' + id + '/intake-qr');
    const d = await r.json();
    openModal('📋 ' + name + ' 的工人录入码', d.qr, d.url);
  } catch (e) {}
}
async function delForeman(id, name) {
  if (!confirm('删除工头「' + name + '」及其所有已录入工人？\nDelete this foreman and all their collected workers?')) return;
  try { await api('/api/admin/foremen/' + id, { method: 'DELETE' }); load(); } catch (e) {}
}
async function delWorker(id, fid) {
  if (!confirm('删除这位工人记录？/ Delete this worker record?')) return;
  try { await api('/api/admin/foreman-workers/' + id, { method: 'DELETE' }); foremen = foremen.map(f => f.id===fid?{...f,worker_count:Math.max(0,f.worker_count-1)}:f); render(); toggleWorkers(fid); } catch (e) {}
}

function openModal(title, qr, url) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImg').src = qr;
  document.getElementById('modalUrl').textContent = url;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

load();
</script>
</body>
</html>
