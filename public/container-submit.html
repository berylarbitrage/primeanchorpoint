<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Container · Entry</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#0f172a;-webkit-text-size-adjust:100%}
  .top{background:#0E7BB8;color:#fff;padding:.9rem 1.1rem .75rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .top-row{display:flex;align-items:flex-start;gap:.5rem}
  .top h1{margin:0;font-size:1.05rem;font-weight:700;letter-spacing:.02em;flex:1}
  .top .partner{margin-top:.2rem;font-size:.84rem;opacity:.92}
  .lang{display:flex;gap:.25rem;background:rgba(255,255,255,.15);border-radius:999px;padding:.15rem;flex-shrink:0}
  .lang button{background:transparent;color:#fff;border:none;padding:.25rem .55rem;border-radius:999px;font-size:.78rem;font-weight:600;cursor:pointer;opacity:.7}
  .lang button.active{background:#fff;color:#0E7BB8;opacity:1}
  .wrap{padding:1rem 1rem 6rem 1rem;max-width:520px;margin:0 auto}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:.85rem;margin-bottom:.85rem;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  label{display:block;font-size:.82rem;font-weight:600;color:#475569;margin:.1rem 0 .35rem}
  .hint{font-size:.74rem;color:#94a3b8;margin-top:.2rem}
  input[type=text],input[type=number]{width:100%;padding:.65rem .75rem;border:1px solid #cbd5e1;border-radius:8px;font-size:1rem;background:#fff;color:#0f172a;outline:none;-webkit-appearance:none}
  input:focus{border-color:#0E7BB8;box-shadow:0 0 0 3px rgba(14,123,184,.15)}
  .row{display:flex;gap:.55rem}
  .row > *{flex:1}
  .photo-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #29AAE1;background:#f0f9ff;color:#0E7BB8;padding:1.4rem .75rem;border-radius:10px;cursor:pointer;text-align:center;font-size:.92rem;font-weight:600;transition:background .15s}
  .photo-zone:active{background:#e0f2fe}
  .photo-zone .emoji{font-size:2.2rem;display:block;margin-bottom:.35rem}
  .photo-zone input{display:none}
  #photoPreviewWrap{position:relative;display:none;margin-top:.6rem}
  #photoPreview{display:block;width:100%;max-height:280px;object-fit:contain;border-radius:10px;border:1px solid #e2e8f0;background:#000}
  #photoClear{position:absolute;top:.4rem;right:.4rem;background:rgba(15,23,42,.85);color:#fff;border:none;border-radius:999px;width:32px;height:32px;font-size:.95rem;cursor:pointer}
  .container-no-input{font-family:'Menlo',ui-monospace,SFMono-Regular,monospace;text-transform:uppercase;letter-spacing:.03em;font-size:1.05rem;font-weight:700;color:#0f172a}
  .chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.45rem}
  .chip{display:inline-flex;align-items:center;gap:.35rem;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:999px;padding:.18rem .55rem;font-size:.84rem;font-weight:600}
  .chip button{background:transparent;border:none;color:#065f46;cursor:pointer;font-size:.95rem;line-height:1;padding:0 .1rem}
  .add-row{display:flex;gap:.45rem;margin-top:.35rem}
  .add-row input{flex:1}
  .add-row button{flex:0 0 auto;padding:.55rem .9rem;background:#047857;color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:600;cursor:pointer}
  .btn-submit{display:block;width:100%;padding:1rem;background:#0E7BB8;color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:.04em;margin-top:.5rem;box-shadow:0 4px 12px rgba(14,123,184,.3)}
  .btn-submit:disabled{background:#94a3b8;box-shadow:none}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:.65rem .8rem;border-radius:8px;font-size:.88rem;margin-bottom:.85rem}
  .ok-state{text-align:center;padding:2rem 1rem}
  .ok-state .check{display:inline-flex;align-items:center;justify-content:center;width:76px;height:76px;background:#dcfce7;color:#15803d;border-radius:50%;font-size:2.4rem;margin-bottom:.8rem}
  .ok-state h2{margin:.2rem 0;color:#15803d}
  .ok-state .meta{color:#475569;margin:.4rem 0 1.5rem;font-size:.92rem}
  .ok-state button{padding:.85rem 1.4rem;background:#0E7BB8;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer}
  .price-prefix{position:relative}
  .price-prefix .symbol{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:#94a3b8;font-weight:600;font-size:1.05rem;pointer-events:none}
  .price-prefix input{padding-left:1.7rem}
  @media(max-width:520px){.wrap{padding:.75rem .75rem 5rem}.card{padding:.75rem}.row{flex-direction:column}.photo-zone{padding:.6rem}}
  @media(max-width:480px){.wrap{padding:.5rem .5rem 4rem}}
</style>

<body>
<div class="top">
  <div class="top-row">
    <div style="flex:1">
      <h1 id="t-title">📦 Container · Entry</h1>
      <div class="partner" id="partnerName">…</div>
    </div>
    <div class="lang" role="tablist" aria-label="Language">
      <button type="button" data-lang="es" onclick="setLang('es')">ES</button>
      <button type="button" data-lang="en" onclick="setLang('en')">EN</button>
      <button type="button" data-lang="zh" onclick="setLang('zh')">中</button>
    </div>
  </div>
</div>

<div class="wrap" id="wrap">
  <div id="errBox" class="err" style="display:none"></div>

  <div id="formMain" style="display:none">
    <div class="card">
      <label id="t-photoLabel">📷 Foto del número de container</label>
      <label for="photoFile" class="photo-zone" id="photoZone">
        <span class="emoji">📸</span>
        <span id="t-photoCta">Toca para tomar foto / elegir</span>
        <span class="hint" id="t-photoHint" style="color:#0E7BB8">Enfoca claramente el número del contenedor</span>
        <input type="file" id="photoFile" accept="image/*" capture="environment">
      </label>
      <div id="photoPreviewWrap">
        <img id="photoPreview" alt="">
        <button type="button" id="photoClear" onclick="clearPhoto()" aria-label="×">×</button>
      </div>
    </div>

    <div class="card">
      <label id="t-noLabel">Número de Container</label>
      <input type="text" id="containerNo" class="container-no-input" placeholder="TCNU2960705" autocomplete="off" inputmode="text">
      <div class="hint" id="t-noHint">Letras + números; se convierte a mayúsculas automáticamente</div>
    </div>

    <div class="card" id="priceCard">
      <label id="t-priceLabel">Precio ($ por unidad)</label>
      <div class="price-prefix">
        <span class="symbol">$</span>
        <input type="number" id="unitPrice" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
      </div>
    </div>

    <div class="card">
      <label id="t-partLabel">👥 Personas que participaron</label>
      <div class="add-row">
        <input type="text" id="partName" placeholder="Nombre" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();addParticipant()}">
        <button type="button" id="t-addBtn" onclick="addParticipant()">＋ Agregar</button>
      </div>
      <div class="chips" id="partChips"></div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()">✓ <span id="t-submitBtn">Enviar</span></button>
  </div>

  <div id="okState" class="ok-state" style="display:none">
    <div class="check">✓</div>
    <h2 id="t-okTitle">¡Enviado!</h2>
    <div class="meta"><span id="t-okFor">Enviado a</span> <strong id="okPartner"></strong></div>
    <button onclick="resetForm()" id="t-okAgain">Registrar otro</button>
  </div>
</div>

<script>
// ── i18n ──
const I18N = {
  es: {
    title: '📦 Container · Registro',
    photoLabel: '📷 Foto del número de container',
    photoCta: 'Toca para tomar foto / elegir',
    photoHint: 'Enfoca claramente el número del contenedor',
    noLabel: 'Número de Container',
    noHint: 'Letras + números; se convierte a mayúsculas',
    qtyLabel: 'Cantidad',
    priceLabel: 'Precio ($ por unidad)',
    partLabel: '👥 Personas que participaron',
    partNamePh: 'Nombre',
    addBtn: '＋ Agregar',
    submitBtn: 'Enviar',
    submitting: 'Enviando…',
    okTitle: '¡Enviado!',
    okFor: 'Enviado a',
    okAgain: 'Registrar otro',
    errNoToken: 'Por favor escanee el código QR oficial para acceder a esta página.',
    errAtLeastOne: 'Por favor ingrese el número de container, tome una foto, o agregue una persona.',
    errMaxPart: 'Máximo 20 personas',
    errSubmit: 'Error al enviar: ',
    sendingTo: 'Enviar a: ',
    loading: 'Cargando…',
    invalid: 'Enlace inválido o expirado',
  },
  en: {
    title: '📦 Container · Entry',
    photoLabel: '📷 Photo of container number',
    photoCta: 'Tap to take photo / choose',
    photoHint: 'Aim clearly at the container number',
    noLabel: 'Container Number',
    noHint: 'Letters + numbers; auto-uppercased',
    qtyLabel: 'Quantity',
    priceLabel: 'Price ($/unit)',
    partLabel: '👥 People involved',
    partNamePh: 'Name',
    addBtn: '＋ Add',
    submitBtn: 'Submit',
    submitting: 'Submitting…',
    okTitle: 'Submitted!',
    okFor: 'Sent to',
    okAgain: 'Submit another',
    errNoToken: 'Please scan the official QR code to access this page.',
    errAtLeastOne: 'Please enter container number, take a photo, or add at least one person.',
    errMaxPart: 'Maximum 20 people',
    errSubmit: 'Submit failed: ',
    sendingTo: 'Submitting to: ',
    loading: 'Loading…',
    invalid: 'Link invalid or expired',
  },
  zh: {
    title: '📦 Container 现场录入',
    photoLabel: '📷 拍 Container 号牌',
    photoCta: '点击拍照 / 选择照片',
    photoHint: '对准箱号正面拍清楚',
    noLabel: 'Container 号',
    noHint: '字母数字混合；输入后自动转大写',
    qtyLabel: '数量',
    priceLabel: '价格 ($/箱)',
    partLabel: '👥 参与的人',
    partNamePh: '名字',
    addBtn: '＋ 加人',
    submitBtn: '提交',
    submitting: '提交中…',
    okTitle: '提交成功',
    okFor: '已发送给',
    okAgain: '继续录入下一条',
    errNoToken: '请通过专属二维码访问此页面。',
    errAtLeastOne: '请至少填写 container 号、拍照，或加一个参与人。',
    errMaxPart: '最多 20 人',
    errSubmit: '提交失败：',
    sendingTo: '提交给：',
    loading: '加载中…',
    invalid: '链接无效或已失效',
  },
};

function pickInitialLang() {
  const stored = localStorage.getItem('csub_lang');
  if (stored && I18N[stored]) return stored;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('en')) return 'en';
  return 'es'; // default to Spanish (most common audience on-site)
}

let _lang = pickInitialLang();
function applyLang() {
  const L = I18N[_lang];
  document.documentElement.lang = _lang;
  document.title = L.title;
  document.getElementById('t-title').textContent = L.title;
  document.getElementById('t-photoLabel').textContent = L.photoLabel;
  document.getElementById('t-photoCta').textContent = L.photoCta;
  document.getElementById('t-photoHint').textContent = L.photoHint;
  document.getElementById('t-noLabel').textContent = L.noLabel;
  document.getElementById('t-noHint').textContent = L.noHint;
  document.getElementById('t-priceLabel').textContent = L.priceLabel;
  document.getElementById('t-partLabel').textContent = L.partLabel;
  document.getElementById('partName').placeholder = L.partNamePh;
  document.getElementById('t-addBtn').textContent = L.addBtn;
  document.getElementById('t-submitBtn').textContent = L.submitBtn;
  document.getElementById('t-okTitle').textContent = L.okTitle;
  document.getElementById('t-okFor').textContent = L.okFor;
  document.getElementById('t-okAgain').textContent = L.okAgain;
  // Update partner subtitle
  if (_partnerName) document.getElementById('partnerName').textContent = L.sendingTo + _partnerName;
  // Reflect active language button
  document.querySelectorAll('.lang button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === _lang);
  });
}
function setLang(lang) {
  if (!I18N[lang]) return;
  _lang = lang;
  localStorage.setItem('csub_lang', lang);
  applyLang();
}

// ── token: path /c/TOKEN or query ?t=TOKEN ──
const params = new URLSearchParams(location.search);
const _pathMatch = location.pathname.match(/^\/c\/([a-f0-9A-F]{16,})/);
const TOKEN = (_pathMatch && _pathMatch[1]) || params.get('t') || '';
// Two QR codes per company: ?type=start (开始装/卸柜) or ?type=end (结束)。默认 start。
const SUBMIT_TYPE = params.get('type') === 'end' ? 'end' : 'start';

let _photoFile = null;
let _participants = [];
let _partnerName = '';
let _pw = '';
// Per-type key so START and END each prompt for the password (both gated).
const _PW_KEY = 'csub_pw_' + TOKEN + '_' + SUBMIT_TYPE;

function showErr(msg) {
  const box = document.getElementById('errBox');
  box.textContent = msg;
  box.style.display = '';
}

// Password gate (shared access code). Shown before the form until verified.
function showGate() {
  document.getElementById('formMain').style.display = 'none';
  let g = document.getElementById('pwGate');
  if (!g) {
    g = document.createElement('div');
    g.id = 'pwGate';
    g.style.cssText = 'margin:1rem 0;text-align:center';
    g.innerHTML = `
      <div style="font-weight:700;margin-bottom:.5rem">🔒 请输入密码 / Password / Contraseña</div>
      <input id="pwInput" type="tel" inputmode="numeric" autocomplete="off"
        style="width:100%;max-width:240px;padding:.7rem;border:1px solid #cbd5e1;border-radius:10px;font-size:1.3rem;text-align:center;letter-spacing:.3em">
      <div style="margin-top:.7rem"><button id="pwBtn" type="button"
        style="padding:.7rem 1.6rem;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer">进入 / Enter</button></div>
      <div id="pwErr" style="color:#dc2626;margin-top:.6rem;min-height:1.1em;font-size:.9rem"></div>`;
    const fm = document.getElementById('formMain');
    fm.parentNode.insertBefore(g, fm);
    document.getElementById('pwBtn').onclick = verifyGate;
    document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') verifyGate(); });
  }
  g.style.display = '';
  setTimeout(() => { const i = document.getElementById('pwInput'); if (i) i.focus(); }, 100);
}

async function verifyGate() {
  const pw = (document.getElementById('pwInput').value || '').trim();
  document.getElementById('pwErr').textContent = '';
  try {
    const r = await fetch('/c-submit/verify?t=' + encodeURIComponent(TOKEN), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw })
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok) { document.getElementById('pwErr').textContent = '密码错误 / Wrong password'; return; }
    _pw = pw;
    sessionStorage.setItem(_PW_KEY, pw);
    document.getElementById('pwGate').style.display = 'none';
    openForm();
  } catch (e) { document.getElementById('pwErr').textContent = 'Error: ' + (e.message || e); }
}

function openForm() {
  document.getElementById('formMain').style.display = '';
  showTypeBanner();
}

// Prominent banner so the worker knows this QR logs START vs END.
function showTypeBanner() {
  const isEnd = SUBMIT_TYPE === 'end';
  const label = isEnd ? '🔴 结束 / End / Fin' : '🟢 开始 / Start / Inicio';
  document.title = (isEnd ? '结束登记 · ' : '开始登记 · ') + (_partnerName || 'Container');
  let b = document.getElementById('typeBanner');
  if (!b) {
    b = document.createElement('div');
    b.id = 'typeBanner';
    b.style.cssText = 'margin:0 0 .9rem;padding:.7rem .9rem;border-radius:10px;font-weight:800;font-size:1.05rem;text-align:center';
    const fm = document.getElementById('formMain');
    fm.insertBefore(b, fm.firstChild);
  }
  b.textContent = label;
  b.style.background = isEnd ? '#fef2f2' : '#f0fdf4';
  b.style.color = isEnd ? '#b91c1c' : '#15803d';
  b.style.border = '1px solid ' + (isEnd ? '#fecaca' : '#86efac');
}

// Strongly distinct look for START vs END so they can't be confused on site.
function applyTheme() {
  const isEnd = SUBMIT_TYPE === 'end';
  const main = isEnd ? '#b91c1c' : '#15803d';
  document.body.style.background = isEnd ? '#fef2f2' : '#f0fdf4';
  const top = document.querySelector('.top');
  if (top) top.style.background = main;
  const pc = document.getElementById('priceCard');
  if (pc) pc.style.display = isEnd ? 'none' : '';   // END has no price
  const st = document.createElement('style');
  st.textContent = `.btn-submit{background:${main} !important;box-shadow:0 4px 12px ${isEnd ? 'rgba(185,28,28,.35)' : 'rgba(21,128,61,.35)'} !important}`
    + `#t-addBtn{background:${main} !important}`;
  document.head.appendChild(st);
}

async function init() {
  applyLang();
  applyTheme();
  if (!TOKEN) {
    showErr(I18N[_lang].errNoToken);
    document.getElementById('partnerName').textContent = '—';
    return;
  }
  try {
    const r = await fetch('/c-submit/info?t=' + encodeURIComponent(TOKEN));
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      showErr(j.error || I18N[_lang].invalid);
      document.getElementById('partnerName').textContent = '—';
      return;
    }
    const info = await r.json();
    _partnerName = info.partner_name || '';
    document.getElementById('partnerName').textContent = I18N[_lang].sendingTo + _partnerName;
    // Password gate: skip if already entered this session, else show the gate.
    const saved = sessionStorage.getItem(_PW_KEY);
    if (saved) { _pw = saved; openForm(); } else { showGate(); }
  } catch (e) {
    showErr('Error: ' + (e.message || e));
  }
}
init();

document.getElementById('photoFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  _photoFile = f;
  const url = URL.createObjectURL(f);
  document.getElementById('photoPreview').src = url;
  document.getElementById('photoPreviewWrap').style.display = '';
  document.getElementById('photoZone').style.display = 'none';
});

function clearPhoto() {
  _photoFile = null;
  document.getElementById('photoFile').value = '';
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoZone').style.display = '';
}

document.getElementById('containerNo').addEventListener('input', e => {
  const v = e.target.value;
  const up = v.toUpperCase();
  if (v !== up) e.target.value = up;
});

function addParticipant() {
  const inp = document.getElementById('partName');
  const name = (inp.value || '').trim();
  if (!name) return;
  if (_participants.length >= 20) { showErr(I18N[_lang].errMaxPart); return; }
  _participants.push(name);
  inp.value = '';
  renderChips();
}
function removeParticipant(idx) {
  _participants.splice(idx, 1);
  renderChips();
}
function renderChips() {
  const wrap = document.getElementById('partChips');
  wrap.innerHTML = _participants.map((n, i) =>
    `<span class="chip">${escHtml(n)}<button type="button" onclick="removeParticipant(${i})" aria-label="×">×</button></span>`
  ).join('');
}
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function submitForm() {
  const cno = document.getElementById('containerNo').value.trim().toUpperCase();
  if (!cno && !_photoFile && _participants.length === 0) {
    showErr(I18N[_lang].errAtLeastOne);
    return;
  }
  document.getElementById('errBox').style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('t-submitBtn').textContent = I18N[_lang].submitting;
  try {
    const fd = new FormData();
    fd.append('container_no', cno);
    fd.append('unit_price', document.getElementById('unitPrice').value || '0');
    fd.append('participants', JSON.stringify(_participants));
    fd.append('submit_type', SUBMIT_TYPE);
    fd.append('password', _pw || '');
    if (_photoFile) fd.append('photo', _photoFile);
    const resp = await fetch('/c-submit?t=' + encodeURIComponent(TOKEN), { method: 'POST', body: fd });
    const j = await resp.json().catch(() => ({}));
    if (j && j.code === 'bad_password') {
      // Saved code no longer valid — clear and re-show the gate.
      sessionStorage.removeItem(_PW_KEY); _pw = '';
      btn.disabled = false; document.getElementById('t-submitBtn').textContent = I18N[_lang].submitBtn;
      showGate();
      document.getElementById('pwErr').textContent = '密码已变更，请重新输入 / Password changed';
      return;
    }
    if (!resp.ok || !j.success) throw new Error(j.error || 'submit failed');
    document.getElementById('formMain').style.display = 'none';
    document.getElementById('okState').style.display = '';
    document.getElementById('okPartner').textContent = _partnerName;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    showErr(I18N[_lang].errSubmit + (e.message || e));
  } finally {
    btn.disabled = false;
    document.getElementById('t-submitBtn').textContent = I18N[_lang].submitBtn;
  }
}

function resetForm() {
  document.getElementById('containerNo').value = '';
  document.getElementById('unitPrice').value = '';
  _participants = [];
  renderChips();
  clearPhoto();
