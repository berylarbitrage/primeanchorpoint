<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工人登记 / Worker Sign-up</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;color:#0f172a;-webkit-text-size-adjust:100%}
  .top{background:#0F2B5B;color:#fff;padding:.9rem 1.1rem .75rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .top h1{margin:0;font-size:1.05rem;font-weight:700;letter-spacing:.02em}
  .top .partner{margin-top:.25rem;font-size:.84rem;opacity:.92}
  .wrap{padding:1rem 1rem 6rem 1rem;max-width:520px;margin:0 auto}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:.95rem;margin-bottom:.85rem;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h2{margin:0 0 .7rem;font-size:.98rem;color:#0F2B5B}
  label{display:block;font-size:.82rem;font-weight:600;color:#475569;margin:.55rem 0 .35rem}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:.65rem .75rem;border:1px solid #cbd5e1;border-radius:8px;font-size:1rem;background:#fff;color:#0f172a;outline:none;-webkit-appearance:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:#2E5BA0;box-shadow:0 0 0 3px rgba(46,91,160,.15)}
  textarea{min-height:60px;resize:vertical}
  .req{color:#dc2626}
  .btn-submit{display:block;width:100%;padding:1rem;background:#0F2B5B;color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:.03em;margin-top:.6rem;box-shadow:0 4px 12px rgba(15,43,91,.3)}
  .btn-submit:disabled{background:#94a3b8;box-shadow:none}
  .btn-outline{display:inline-block;padding:.8rem 1.4rem;background:#fff;color:#0F2B5B;border:1.5px solid #0F2B5B;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:.65rem .8rem;border-radius:8px;font-size:.88rem;margin-top:.6rem;min-height:1em}
  .err:empty{display:none;padding:0;border:0;margin:0}
  #loading,#invalid{text-align:center;color:#475569;padding:2.5rem 1rem}
  .ok-state{text-align:center;padding:2.5rem 1rem}
  .ok-state .check{display:inline-flex;align-items:center;justify-content:center;width:76px;height:76px;background:#dcfce7;color:#15803d;border-radius:50%;font-size:2.4rem;margin-bottom:.8rem}
  .ok-state h2{margin:.2rem 0;color:#15803d}
  .ok-state .meta{color:#475569;margin:.4rem 0 1.5rem;font-size:.92rem}
</style>
</head>
<body>
<div class="top">
  <h1>👷 工人登记 / Worker Sign-up</h1>
  <div class="partner" id="fmBadge">…</div>
</div>

<div class="wrap">
  <div id="loading">加载中… / Loading…</div>

  <div id="invalid" style="display:none">
    <div style="font-size:2.4rem">⚠️</div>
    <p>链接无效或已失效<br>This link is invalid or has expired.</p>
  </div>

  <div id="main" style="display:none">
    <div class="card" id="formCard">
      <h2>① 工人信息 / Worker Info</h2>
      <label>姓名 Name <span class="req">*</span></label>
      <input id="w-name" autocomplete="name" placeholder="工人姓名 / Worker's full name">

      <label>电话 Phone</label>
      <input id="w-phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="(xxx) xxx-xxxx">

      <label>邮箱 Email</label>
      <input id="w-email" type="email" inputmode="email" autocomplete="email" placeholder="email@example.com">

      <label>语言 Language</label>
      <select id="w-language">
        <option value="">— 选择 / Select —</option>
        <option value="中文">中文 Chinese</option>
        <option value="English">English</option>
        <option value="Español">Español Spanish</option>
        <option value="其他">其他 / Other</option>
      </select>

      <label>职位 / 工种 Position</label>
      <input id="w-position" placeholder="例：装卸 / 叉车 / Forklift…">

      <label>备注 Notes</label>
      <textarea id="w-notes" placeholder="选填 / Optional"></textarea>

      <button class="btn-submit" id="submitBtn" onclick="submitWorker()">提交 / Submit</button>
      <div class="err" id="err"></div>
    </div>

    <div id="done" class="ok-state" style="display:none">
      <div class="check">✓</div>
      <h2>已添加！Added!</h2>
      <div class="meta" id="addedName"></div>
      <button class="btn-outline" onclick="addAnother()">➕ 继续添加下一个工人 / Add another</button>
      <div class="meta" id="countLine" style="margin-top:1rem"></div>
    </div>
  </div>
</div>

<script>
const TOKEN = location.pathname.split('/').filter(Boolean).pop();
let addedCount = 0;

async function init() {
  try {
    const resp = await fetch('/api/public/foreman-intake/' + encodeURIComponent(TOKEN));
    if (!resp.ok) throw new Error('invalid');
    const f = await resp.json();
    let badge = '工头 / Foreman: ' + f.foreman_name;
    if (f.warehouse) badge += ' · ' + f.warehouse;
    document.getElementById('fmBadge').textContent = badge;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch {
    document.getElementById('fmBadge').textContent = '—';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('invalid').style.display = 'block';
  }
}

async function submitWorker() {
  const name = document.getElementById('w-name').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (!name) { err.textContent = '请填写工人姓名 / Please enter the worker name'; return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中… / Submitting…';
  try {
    const resp = await fetch('/api/public/foreman-intake/' + encodeURIComponent(TOKEN), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        phone: document.getElementById('w-phone').value.trim(),
        email: document.getElementById('w-email').value.trim(),
        language: document.getElementById('w-language').value,
        position: document.getElementById('w-position').value.trim(),
        notes: document.getElementById('w-notes').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || '提交失败 / Submit failed');
    addedCount++;
    document.getElementById('addedName').textContent = name;
    document.getElementById('countLine').textContent = '本次已录入 ' + addedCount + ' 人 / ' + addedCount + ' added this session';
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('done').style.display = 'block';
    window.scrollTo(0, 0);
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '提交 / Submit';
  }
}

function addAnother() {
  ['w-name','w-phone','w-email','w-position','w-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('w-language').value = '';
  document.getElementById('done').style.display = 'none';
  document.getElementById('formCard').style.display = 'block';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false; btn.textContent = '提交 / Submit';
  document.getElementById('w-name').focus();
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
