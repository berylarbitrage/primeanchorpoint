<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工人登记 / Worker Sign-up</title>
<style>
  :root { --amber:#b45309; --amber-d:#92400e; --bg:#fffaf0; --line:#e7e0d2; --gray:#6b6256; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:#241f17; line-height:1.5; }
  .wrap { max-width:480px; margin:0 auto; padding:1.25rem 1.1rem 3rem; }
  .head { text-align:center; margin:.5rem 0 1.1rem; }
  .head h1 { font-size:1.35rem; margin:.2rem 0; color:var(--amber-d); }
  .head .fm { display:inline-block; margin-top:.4rem; padding:.35rem .9rem; background:#fff3e0; border:1px solid #f0d7a8; border-radius:20px; font-size:.85rem; font-weight:700; color:var(--amber-d); }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:1.1rem; box-shadow:0 2px 10px rgba(0,0,0,.04); }
  label { display:block; font-size:.82rem; font-weight:700; margin:.85rem 0 .3rem; color:#3d3528; }
  label .req { color:#dc2626; }
  input, select, textarea { width:100%; padding:.7rem .8rem; border:1px solid #d8cfbe; border-radius:10px; font-size:1rem; background:#fffdf8; outline:none; font-family:inherit; }
  input:focus, select:focus, textarea:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(180,83,9,.12); }
  textarea { min-height:56px; resize:vertical; }
  .btn { width:100%; margin-top:1.3rem; padding:.85rem; border:none; border-radius:11px; background:var(--amber-d); color:#fff; font-size:1.02rem; font-weight:700; cursor:pointer; }
  .btn:disabled { opacity:.6; }
  .btn-ghost { background:#fff; color:var(--amber-d); border:1.5px solid var(--amber-d); }
  .err { color:#dc2626; font-size:.85rem; margin-top:.6rem; text-align:center; min-height:1em; }
  #loading, #invalid { text-align:center; color:var(--gray); padding:2rem 1rem; }
  #done { display:none; text-align:center; }
  #done .ok { font-size:2.8rem; }
  #done h2 { color:#15803d; margin:.3rem 0; }
  .count { font-size:.8rem; color:var(--gray); margin-top:.4rem; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading">加载中… / Loading…</div>

  <div id="invalid" style="display:none">
    <div style="font-size:2.4rem">⚠️</div>
    <p>链接无效或已失效<br>This link is invalid or has expired.</p>
  </div>

  <div id="main" style="display:none">
    <div class="head">
      <div style="font-size:1.9rem">👷</div>
      <h1>工人登记</h1>
      <div style="font-size:.82rem;color:var(--gray)">Worker Sign-up</div>
      <div class="fm" id="fmBadge"></div>
    </div>

    <div class="card" id="formCard">
      <label>姓名 Name <span class="req">*</span></label>
      <input id="w-name" autocomplete="name" placeholder="工人姓名 / Worker's full name">

      <label>电话 Phone</label>
      <input id="w-phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="(xxx) xxx-xxxx">

      <label>邮箱 Email</label>
      <input id="w-email" type="email" inputmode="email" autocomplete="email" placeholder="email@example.com">

      <label>语言 Language</label>
      <select id="w-language">
        <option value="">— 选择 / Select —</option>
        <option value="中文">中文 Chinese</option>
        <option value="English">English</option>
        <option value="Español">Español Spanish</option>
        <option value="其他">其他 / Other</option>
      </select>

      <label>职位 / 工种 Position</label>
      <input id="w-position" placeholder="例：装卸 / 叉车 / Forklift…">

      <label>备注 Notes</label>
      <textarea id="w-notes" placeholder="选填 / Optional"></textarea>

      <button class="btn" id="submitBtn" onclick="submitWorker()">提交 / Submit</button>
      <div class="err" id="err"></div>
    </div>

    <div id="done">
      <div class="ok">✅</div>
      <h2>已添加！Added!</h2>
      <p style="color:var(--gray);font-size:.88rem" id="addedName"></p>
      <button class="btn" onclick="addAnother()">➕ 继续添加下一个工人 / Add another</button>
      <div class="count" id="countLine"></div>
    </div>
  </div>
</div>

<script>
const TOKEN = location.pathname.split('/').filter(Boolean).pop();
let addedCount = 0;

async function init() {
  try {
    const resp = await fetch('/api/public/foreman-intake/' + encodeURIComponent(TOKEN));
    if (!resp.ok) throw new Error('invalid');
    const f = await resp.json();
    let badge = '工头 / Foreman: ' + f.foreman_name;
    if (f.warehouse) badge += ' · ' + f.warehouse;
    document.getElementById('fmBadge').textContent = badge;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('invalid').style.display = 'block';
  }
}

async function submitWorker() {
  const name = document.getElementById('w-name').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (!name) { err.textContent = '请填写工人姓名 / Please enter the worker name'; return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中… / Submitting…';
  try {
    const resp = await fetch('/api/public/foreman-intake/' + encodeURIComponent(TOKEN), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        phone: document.getElementById('w-phone').value.trim(),
        email: document.getElementById('w-email').value.trim(),
        language: document.getElementById('w-language').value,
        position: document.getElementById('w-position').value.trim(),
        notes: document.getElementById('w-notes').value.trim()
      })
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || '提交失败 / Submit failed');
    addedCount++;
    document.getElementById('addedName').textContent = name;
    document.getElementById('countLine').textContent = '本次已录入 ' + addedCount + ' 人 / ' + addedCount + ' added this session';
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('done').style.display = 'block';
    window.scrollTo(0, 0);
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '提交 / Submit';
  }
}

function addAnother() {
  ['w-name','w-phone','w-email','w-position','w-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('w-language').value = '';
  document.getElementById('done').style.display = 'none';
  document.getElementById('formCard').style.display = 'block';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false; btn.textContent = '提交 / Submit';
  document.getElementById('w-name').focus();
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
