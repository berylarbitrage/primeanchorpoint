<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Anchorpoint — 管理后台</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#0F2B5B;--sky:#4A90D9;--sky-light:#E8F0FE;--accent:#F5A623;--white:#fff;--off-white:#F7F8FA;--gray-200:#e2e5ea;--gray-400:#9BA3B0;--gray-600:#5F6B7A;--gray-800:#2D3748;--red:#E63946;--green:#2D9D78;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--gray-800)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--white);padding:3rem;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:1.3rem;color:var(--blue);margin-bottom:.5rem}.login-box p{font-size:.85rem;color:var(--gray-400);margin-bottom:2rem}
.login-box input{width:100%;padding:12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:var(--sky)}
.login-box button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-weight:700;cursor:pointer;font-size:.95rem}
.login-box button:hover{background:var(--sky)}
.login-box .err{color:var(--red);font-size:.82rem;margin-top:.5rem}

.app{display:none}.app.show{display:block}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--blue);color:#fff;padding:1.5rem 0}
.sidebar h2{font-size:1rem;padding:0 1.5rem;margin-bottom:2rem;color:var(--sky)}
.sidebar a{display:block;padding:10px 1.5rem;color:rgba(255,255,255,.5);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.08)}
.sidebar .logout{position:absolute;bottom:1.5rem;left:0;right:0;padding:10px 1.5rem;color:var(--red);font-size:.82rem}
.main{margin-left:220px;padding:2rem}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:.5rem}
.top h1{font-size:1.5rem;color:var(--blue)}
.top-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.btn{padding:8px 20px;background:var(--sky);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:.82rem;transition:all .2s}
.btn:hover{background:var(--blue)}.btn-red{background:var(--red)}.btn-red:hover{background:#c5303c}
.btn-green{background:var(--green)}.btn-green:hover{background:#1e7a5c}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#d9900e}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-outline{background:transparent;border:1px solid var(--gray-200);color:var(--gray-600)}.btn-outline:hover{background:var(--gray-200);color:var(--gray-800)}
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:.75rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-200)}
td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--gray-200);color:var(--gray-600)}
tr:hover td{background:var(--sky-light)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:700}
.badge-en{background:#E8F0FE;color:#4A90D9}.badge-zh{background:#FFF3E0;color:#E67E22}.badge-es{background:#E8F5E9;color:#2D9D78}
.badge-employer{background:#E8F0FE;color:var(--blue)}.badge-seeker{background:#FFF3E0;color:#E67E22}.badge-other{background:var(--gray-200);color:var(--gray-600)}
.badge-urgent{background:var(--red);color:#fff}
.badge-assigned{background:#E8F0FE;color:var(--sky)}.badge-working{background:#FFF3E0;color:var(--accent)}.badge-completed{background:#E8F5E9;color:var(--green)}.badge-cancelled{background:var(--gray-200);color:var(--gray-600)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;padding:2rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.2rem;color:var(--blue);margin-bottom:1.5rem}
.field{margin-bottom:1rem}.field label{display:block;font-size:.78rem;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:.9rem;outline:none;font-family:inherit}
.field textarea{height:80px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sky)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.04);text-align:center}
.stat-card h3{font-size:2rem;color:var(--sky)}.stat-card p{font-size:.82rem;color:var(--gray-400)}
.empty{text-align:center;padding:3rem;color:var(--gray-400)}
.search-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:.85rem;outline:none;font-family:inherit}
.search-bar input{flex:1;min-width:200px}
.search-bar input:focus,.search-bar select:focus{border-color:var(--sky)}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;display:flex;flex-wrap:wrap;padding:.5rem}.sidebar h2{display:none}.sidebar a{padding:8px 12px;font-size:.78rem}.main{margin-left:0}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
  <h1>Prime Anchorpoint</h1>
  <p>管理后台</p>
  <input type="text" id="userInput" placeholder="用户名" autocomplete="username">
  <input type="password" id="passInput" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">登录</button>
  <div class="err" id="loginErr"></div>
</div>
</div>

<!-- APP -->
<div class="app" id="app">
<div class="sidebar">
  <h2>⚓ 管理后台</h2>
  <a class="active" onclick="showTab('dashboard')">仪表盘</a>
  <a onclick="showTab('inquiries')">问卷管理</a>
  <a onclick="showTab('assignments')">派工管理</a>
  <a onclick="showTab('jobs')">职位管理</a>
  <a onclick="showTab('partners')">合作公司</a>
  <a onclick="showTab('backups')">备份管理</a>
  <a class="logout" onclick="logout()">退出登录</a>
</div>
<div class="main">

<!-- Dashboard -->
<div id="tab-dashboard">
  <div class="top"><h1>仪表盘</h1></div>
  <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
    <div class="stat-card"><h3 id="statInq">0</h3><p>问卷总数</p></div>
    <div class="stat-card"><h3 id="statNew">0</h3><p>本周新增</p></div>
    <div class="stat-card"><h3 id="statAssign">0</h3><p>已派工</p></div>
    <div class="stat-card"><h3 id="statJobs">0</h3><p>在招职位</p></div>
    <div class="stat-card"><h3 id="statPartners">0</h3><p>合作公司</p></div>
  </div>
  <div class="card"><h3 style="margin-bottom:1rem;color:var(--blue)">最近提交的问卷</h3><div id="recentInq"></div></div>
</div>

<!-- Inquiries -->
<div id="tab-inquiries" style="display:none">
  <div class="top">
    <h1>问卷管理</h1>
    <div class="top-actions">
      <button class="btn btn-outline" onclick="exportCSV()">导出 CSV</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="inqSearch" placeholder="搜索姓名、邮箱、电话..." oninput="filterInquiries()">
    <select id="inqTypeFilter" onchange="filterInquiries()">
      <option value="">全部类型</option>
      <option value="Employer">雇主</option>
      <option value="Job Seeker">求职者</option>
      <option value="Other">其他</option>
    </select>
  </div>
  <div class="card"><table><thead><tr><th>日期</th><th>姓名</th><th>类型</th><th>邮箱</th><th>电话</th><th>操作</th></tr></thead><tbody id="inqTable"></tbody></table></div>
</div>

<!-- Assignments -->
<div id="tab-assignments" style="display:none">
  <div class="top">
    <h1>派工管理</h1>
    <div class="top-actions">
      <button class="btn btn-green" onclick="openAssignModal()">+ 新建派工</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="assignSearch" placeholder="搜索人员、职位..." oninput="filterAssignments()">
    <select id="assignStatusFilter" onchange="filterAssignments()">
      <option value="">全部状态</option>
      <option value="assigned">已分配</option>
      <option value="working">工作中</option>
      <option value="completed">已完成</option>
      <option value="cancelled">已取消</option>
    </select>
  </div>
  <div class="card"><table><thead><tr><th>日期</th><th>人员</th><th>分配职位</th><th>工作地点</th><th>状态</th><th>操作</th></tr></thead><tbody id="assignTable"></tbody></table></div>
</div>

<!-- Jobs -->
<div id="tab-jobs" style="display:none">
  <div class="top">
    <h1>职位管理</h1>
    <div class="top-actions">
      <button class="btn" onclick="openJobModal()">+ 新增职位</button>
    </div>
  </div>
  <div class="card"><table><thead><tr><th>职位名称</th><th>类型</th><th>地点</th><th>语言</th><th>状态</th><th>操作</th></tr></thead><tbody id="jobsTable"></tbody></table></div>
</div>

<!-- Partners -->
<div id="tab-partners" style="display:none">
  <div class="top">
    <h1>合作公司管理</h1>
    <div class="top-actions">
      <button class="btn" onclick="openPartnerModal()">+ 新增公司</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="partnerSearch" placeholder="搜索公司名称、联系人、行业..." oninput="filterPartners()">
    <select id="partnerStatusFilter" onchange="filterPartners()">
      <option value="">全部状态</option>
      <option value="1">合作中</option>
      <option value="0">已停止</option>
    </select>
  </div>
  <div class="card"><table><thead><tr><th>公司名称</th><th>联系人</th><th>电话</th><th>行业</th><th>状态</th><th>操作</th></tr></thead><tbody id="partnersTable"></tbody></table></div>
</div>

<!-- Backups -->
<div id="tab-backups" style="display:none">
  <div class="top">
    <h1>备份管理</h1>
    <div class="top-actions">
      <button class="btn btn-accent" id="backupNowBtn" onclick="runBackupNow()">立即备份</button>
    </div>
  </div>
  <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card"><h3 id="bkLocations">0</h3><p>备份存储位置</p></div>
    <div class="stat-card"><h3 id="bkInterval">0</h3><p>自动备份间隔(分钟)</p></div>
    <div class="stat-card"><h3 id="bkKeep">0</h3><p>每位置保留份数</p></div>
  </div>
  <div id="backupLocations"></div>
  <div class="card" style="margin-top:1rem">
    <h3 style="margin-bottom:1rem;color:var(--blue)">备份日志</h3>
    <div id="backupLogTable"></div>
  </div>
</div>

</div></div>

<!-- Job Modal -->
<div class="modal-bg" id="jobModal"><div class="modal">
  <h2 id="jobModalTitle">新增职位</h2>
  <input type="hidden" id="jobId">
  <div class="field"><label>职位名称 *</label><input id="jTitle" placeholder="例：仓库分拣员"></div>
  <div class="field-row">
    <div class="field"><label>类型</label><input id="jType" placeholder="例：全职、临时工"></div>
    <div class="field"><label>工作地点</label><input id="jLocation" placeholder="例：Chicago, IL"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>薪资</label><input id="jPay" placeholder="例：$18-22/hr"></div>
    <div class="field"><label>语言</label><select id="jLang"><option value="en">English</option><option value="zh">中文</option><option value="es">Español</option></select></div>
  </div>
  <div class="field"><label>职位描述</label><textarea id="jDesc" placeholder="详细描述工作内容..."></textarea></div>
  <div class="field"><label><input type="checkbox" id="jUrgent"> 急聘</label></div>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <button class="btn" onclick="saveJob()">保存</button>
    <button class="btn btn-red" onclick="closeJobModal()">取消</button>
  </div>
</div></div>

<!-- Inquiry Detail Modal -->
<div class="modal-bg" id="inqModal"><div class="modal">
  <h2>问卷详情</h2>
  <div id="inqDetail"></div>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <button class="btn btn-green" onclick="assignFromInquiry()">派工</button>
    <button class="btn btn-red" onclick="document.getElementById('inqModal').classList.remove('show')">关闭</button>
  </div>
</div></div>

<!-- Assignment Modal -->
<div class="modal-bg" id="assignModal"><div class="modal">
  <h2 id="assignModalTitle">新建派工</h2>
  <input type="hidden" id="assignId">
  <div class="field"><label>选择人员 *</label><select id="aInquiry"><option value="">-- 请选择 --</option></select></div>
  <div class="field"><label>分配职位 *</label><select id="aJob"><option value="">-- 请选择 --</option></select></div>
  <div class="field"><label>状态</label><select id="aStatus">
    <option value="assigned">已分配</option>
    <option value="working">工作中</option>
    <option value="completed">已完成</option>
    <option value="cancelled">已取消</option>
  </select></div>
  <div class="field"><label>备注</label><textarea id="aNotes" placeholder="备注信息..."></textarea></div>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <button class="btn btn-green" onclick="saveAssignment()">保存</button>
    <button class="btn btn-red" onclick="closeAssignModal()">取消</button>
  </div>
</div></div>

<!-- Partner Modal -->
<div class="modal-bg" id="partnerModal"><div class="modal">
  <h2 id="partnerModalTitle">新增合作公司</h2>
  <input type="hidden" id="partnerId">
  <div class="field"><label>公司名称 *</label><input id="pName" placeholder="例：ABC Logistics Inc."></div>
  <div class="field-row">
    <div class="field"><label>联系人</label><input id="pContact" placeholder="例：张三"></div>
    <div class="field"><label>电话</label><input id="pPhone" placeholder="例：(312) 555-1234"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>邮箱</label><input id="pEmail" placeholder="例：contact@abc.com"></div>
    <div class="field"><label>行业</label><input id="pIndustry" placeholder="例：物流、制造业、食品加工"></div>
  </div>
  <div class="field"><label>地址</label><input id="pAddress" placeholder="例：123 Main St, Chicago, IL 60601"></div>
  <div class="field"><label>合作服务</label><input id="pServices" placeholder="例：临时工派遣、仓库包装、分拣"></div>
  <div class="field"><label>备注</label><textarea id="pNotes" placeholder="合作细节、合同信息等..."></textarea></div>
  <div class="field"><label><input type="checkbox" id="pActive" checked> 合作中</label></div>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <button class="btn" onclick="savePartner()">保存</button>
    <button class="btn btn-red" onclick="closePartnerModal()">取消</button>
  </div>
</div></div>

<!-- Partner Detail Modal -->
<div class="modal-bg" id="partnerDetailModal"><div class="modal">
  <h2>公司详情</h2>
  <div id="partnerDetail"></div>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <button class="btn" onclick="editPartnerFromDetail()">编辑</button>
    <button class="btn btn-red" onclick="document.getElementById('partnerDetailModal').classList.remove('show')">关闭</button>
  </div>
</div></div>

<script>
let TOKEN = '';
const API = '/api';
let allInquiries = [];
let allAssignments = [];
let currentInquiry = null;

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}`, ...(opts.headers || {}) }
  });
  return res.json();
}

// ─── Login ───
async function doLogin() {
  const username = document.getElementById('userInput').value;
  const password = document.getElementById('passInput').value;
  if (!username || !password) { document.getElementById('loginErr').textContent = '请输入用户名和密码'; return; }
  const r = await api('/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
  if (r.success) {
    TOKEN = r.token;
    document.cookie = `pa_token=${TOKEN};path=/;max-age=86400;SameSite=Strict`;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').classList.add('show');
    loadDashboard();
  } else {
    document.getElementById('loginErr').textContent = '用户名或密码错误';
  }
}

function logout() {
  TOKEN = '';
  document.cookie = 'pa_token=;path=/;max-age=0';
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('userInput').value = '';
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').textContent = '';
}

// Check cookie on load
(function() {
  const m = document.cookie.match(/pa_token=([^;]+)/);
  if (m) {
    TOKEN = m[1];
    fetch(API + '/admin/jobs', { headers: { 'Authorization': `Bearer ${TOKEN}` } })
      .then(r => { if (r.ok) { document.getElementById('loginWrap').style.display = 'none'; document.getElementById('app').classList.add('show'); loadDashboard(); } else { TOKEN = ''; document.cookie = 'pa_token=;path=/;max-age=0'; } });
  }
})();

// ─── Tabs ───
function showTab(t) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + t).style.display = 'block';
  document.querySelectorAll('.sidebar a:not(.logout)').forEach(a => a.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  if (t === 'dashboard') loadDashboard();
  if (t === 'jobs') loadJobs();
  if (t === 'inquiries') loadInquiries();
  if (t === 'assignments') loadAssignments();
  if (t === 'partners') loadPartners();
  if (t === 'backups') loadBackups();
}

// ─── Dashboard ───
async function loadDashboard() {
  const [jobs, inqs, assigns, partners] = await Promise.all([api('/admin/jobs'), api('/admin/inquiries'), api('/admin/assignments'), api('/admin/partners')]);
  document.getElementById('statJobs').textContent = jobs.filter(j => j.active).length;
  document.getElementById('statInq').textContent = inqs.length;
  document.getElementById('statAssign').textContent = assigns.length;
  document.getElementById('statPartners').textContent = partners.filter(p => p.active).length;
  const weekAgo = new Date(Date.now() - 7 * 86400000);
  document.getElementById('statNew').textContent = inqs.filter(i => new Date(i.created_at) > weekAgo).length;
  const recent = inqs.slice(0, 5);
  document.getElementById('recentInq').innerHTML = recent.length ? '<table><thead><tr><th>姓名</th><th>类型</th><th>日期</th></tr></thead><tbody>' +
    recent.map(i => `<tr style="cursor:pointer" onclick='showInquiry(${JSON.stringify(i).replace(/'/g,"&#39;")})'>
      <td>${esc(i.name)}</td>
      <td><span class="badge badge-${i.type === 'Employer' ? 'employer' : i.type === 'Job Seeker' ? 'seeker' : 'other'}">${typeLabel(i.type)}</span></td>
      <td>${new Date(i.created_at).toLocaleDateString()}</td>
    </tr>`).join('') +
    '</tbody></table>' : '<p class="empty">暂无问卷提交</p>';
}

function typeLabel(t) {
  if (t === 'Employer') return '雇主';
  if (t === 'Job Seeker') return '求职者';
  return '其他';
}
function statusLabel(s) {
  const m = { assigned: '已分配', working: '工作中', completed: '已完成', cancelled: '已取消' };
  return m[s] || s;
}
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Jobs ───
async function loadJobs() {
  const jobs = await api('/admin/jobs');
  const langBadge = l => l === 'zh' ? 'badge-zh' : l === 'es' ? 'badge-es' : 'badge-en';
  document.getElementById('jobsTable').innerHTML = jobs.length ? jobs.map(j => `<tr>
    <td><strong>${esc(j.title)}</strong>${j.urgent ? ' <span class="badge badge-urgent">急聘</span>' : ''}</td>
    <td>${esc(j.type)}</td><td>${esc(j.location)}</td>
    <td><span class="badge ${langBadge(j.lang)}">${esc(j.lang_name || j.lang)}</span></td>
    <td>${j.active ? '✅ 在招' : '⏸ 停招'}</td>

// ─── Backups (备份管理) ───
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
}

async function loadBackups() {
  const data = await api('/admin/backups');
  document.getElementById('bkLocations').textContent = data.locations.length;
  document.getElementById('bkInterval').textContent = data.interval_min;
  document.getElementById('bkKeep').textContent = data.keep;

  // Render each backup location
  document.getElementById('backupLocations').innerHTML = data.locations.map((loc, idx) => `
    <div class="card">
      <h3 style="margin-bottom:.5rem;color:var(--blue)">存储位置 ${idx + 1}: <span style="font-weight:400;font-size:.85rem;color:var(--gray-600)">${esc(loc.dir)}</span></h3>
      <p style="font-size:.82rem;color:var(--gray-400);margin-bottom:1rem">共 ${loc.count} 份备份</p>
      ${loc.files.length ? '<table><thead><tr><th>备份文件</th><th>大小</th></tr></thead><tbody>' +
        loc.files.map(f => `<tr><td>${esc(f.name)}</td><td>${formatBytes(f.size)}</td></tr>`).join('') +
        '</tbody></table>' : '<p class="empty">暂无备份文件</p>'}
    </div>
  `).join('');

  // Render backup log
  document.getElementById('backupLogTable').innerHTML = data.log.length ? '<table><thead><tr><th>时间</th><th>触发方式</th><th>结果</th></tr></thead><tbody>' +
    data.log.map(l => `<tr>
      <td>${new Date(l.time).toLocaleString()}</td>
      <td>${esc(l.trigger)}</td>
      <td>${l.results.map(r => `<span class="badge ${r.status === 'ok' ? 'badge-completed' : 'badge-urgent'}">${r.status === 'ok' ? '成功' : '失败'}</span> ${esc(r.dir.split('/').pop())}`).join(' &nbsp; ')}</td>
    </tr>`).join('') +
    '</tbody></table>' : '<p class="empty">暂无备份日志</p>';
}

async function runBackupNow() {
  const btn = document.getElementById('backupNowBtn');
  btn.disabled = true;
  btn.textContent = '备份中...';
  try {
    const r = await api('/admin/backups/run', { method: 'POST' });
    if (r.success) {
      const ok = r.result.results.filter(x => x.status === 'ok').length;
      const fail = r.result.results.filter(x => x.status === 'error').length;
      alert(`备份完成！成功: ${ok} 个位置${fail ? ', 失败: ' + fail + ' 个位置' : ''}`);
    }
  } catch (e) {
    alert('备份失败: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '立即备份';
  loadBackups();
}
