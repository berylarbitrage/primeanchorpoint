<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DocuSeal 模板管理</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
  :root{--sky:#0ea5e9;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--radius:10px}
  a{color:var(--sky);text-decoration:none}
  a:hover{text-decoration:underline}

  .topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem}
  .topbar-title{font-size:1.1rem;font-weight:700;color:#1e293b}
  .topbar-back{font-size:.85rem;color:var(--gray-500);display:flex;align-items:center;gap:.35rem}
  .topbar-back:hover{color:var(--sky)}
  .page{max-width:960px;margin:2rem auto;padding:0 1.5rem 4rem}

  .card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:1.5rem;margin-bottom:1.5rem}
  .card-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

  .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.78rem;font-weight:600}
  .badge-green{background:#d1fae5;color:#065f46}
  .badge-red{background:#fee2e2;color:#991b1b}

  label{display:block;font-size:.83rem;font-weight:600;color:var(--gray-600);margin-bottom:.35rem}
  input[type=text]{width:100%;border:1px solid var(--gray-200);border-radius:6px;padding:.5rem .75rem;font-size:.88rem;outline:none;transition:border .15s}
  input[type=text]:focus{border-color:var(--sky)}
  select{border:1px solid var(--gray-200);border-radius:6px;padding:.5rem .75rem;font-size:.88rem;outline:none;background:#fff}
  select:focus{border-color:var(--sky)}

  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.1rem;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-sky{background:var(--sky);color:#fff}
  .btn-sky:hover:not(:disabled){opacity:.88}
  .btn-red{background:var(--red);color:#fff}
  .btn-red:hover:not(:disabled){opacity:.88}
  .btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200)}
  .btn-outline:hover:not(:disabled){background:var(--gray-50)}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover:not(:disabled){opacity:.88}
  .btn-orange{background:var(--orange);color:#fff}
  .btn-orange:hover:not(:disabled){opacity:.88}
  .btn-link{background:none;border:none;color:var(--sky);font-size:.83rem;cursor:pointer;padding:0;font-weight:600}
  .btn-link:hover{text-decoration:underline}

  .cat-label{font-size:.78rem;font-weight:700;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin:1.25rem 0 .6rem;display:flex;align-items:center;gap:.4rem}
  .cat-label:first-child{margin-top:0}
  .cfg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem}
  @media(max-width:700px){.cfg-grid{grid-template-columns:1fr}}
  @media(min-width:701px) and (max-width:900px){.cfg-grid{grid-template-columns:1fr 1fr}}
  .cfg-card{border:1px solid var(--gray-200);border-radius:8px;padding:.85rem}
  .cfg-card-title{font-size:.88rem;font-weight:700;margin-bottom:.2rem}
  .cfg-card-sub{font-size:.75rem;color:var(--orange);margin-bottom:.5rem}
  .cfg-card-info{font-size:.75rem;color:var(--gray-400);margin-top:.35rem}

  .dropzone{border:2px dashed var(--gray-200);border-radius:8px;padding:2rem;text-align:center;color:var(--gray-400);transition:all .2s;cursor:pointer;position:relative}
  .dropzone.drag-over{border-color:var(--sky);background:#f0f9ff;color:var(--sky)}
  .dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .dropzone-icon{font-size:2rem;margin-bottom:.5rem}
  .dropzone-name{font-size:.88rem;color:#1e293b;font-weight:600;margin-top:.5rem}

  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:#fff;padding:.7rem 1.2rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;max-width:360px}
  #toast.show{opacity:1}
  #toast.error{background:#ef4444}
  #toast.success{background:#10b981}

  select.tmpl-select{width:100%;border:1px solid var(--gray-200);border-radius:6px;padding:.5rem .75rem;font-size:.88rem;outline:none}
  select.tmpl-select:focus{border-color:var(--sky)}

  .tmpl-row{display:flex;align-items:center;justify-content:space-between;padding:.7rem .5rem;border-bottom:1px solid var(--gray-100)}
  .tmpl-row:last-child{border-bottom:none}
  .tmpl-row-info{flex:1;min-width:0}
  .tmpl-row-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tmpl-row-meta{font-size:.75rem;color:var(--gray-400);margin-top:.1rem}
  .tmpl-row-actions{display:flex;gap:.4rem;flex-shrink:0;margin-left:.75rem}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
  @media(max-width:560px){.form-row{grid-template-columns:1fr}}

  .create-all-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;padding:.75rem 1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:8px}
  .create-all-bar .info{flex:1;font-size:.85rem;color:#92400e}

  .progress-log{margin-top:.75rem;font-size:.8rem;color:var(--gray-500);max-height:200px;overflow-y:auto}
  .progress-log div{padding:2px 0}
  .progress-log .ok{color:var(--green)}
  .progress-log .err{color:var(--red)}
  .progress-log .skip{color:var(--gray-400)}

  /* ── Custom modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,27,50,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:10000;opacity:0;transition:opacity .18s;pointer-events:none}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal-box{background:#fff;border-radius:14px;padding:1.75rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.18);transform:translateY(8px) scale(.97);transition:transform .18s,opacity .18s;opacity:0}
  .modal-overlay.open .modal-box{transform:translateY(0) scale(1);opacity:1}
  .modal-title{font-size:1rem;font-weight:700;color:#1e293b;margin-bottom:1.1rem}
  .modal-input{width:100%;border:1.5px solid var(--gray-200);border-radius:8px;padding:.6rem .85rem;font-size:.9rem;outline:none;color:#1e293b;transition:border .15s;font-family:inherit}
  .modal-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
  .modal-actions{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.25rem}

  /* ── Fullscreen builder modal ── */
  .builder-overlay{position:fixed;inset:0;background:#fff;z-index:10001;display:flex;flex-direction:column;opacity:0;transition:opacity .18s;pointer-events:none}
  .builder-overlay.open{opacity:1;pointer-events:all}
  .builder-bar{background:#1e293b;color:#fff;padding:.65rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0}
  .builder-bar-title{flex:1;font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .builder-body{flex:1;overflow:hidden;position:relative}
  .builder-body docuseal-builder,.builder-body iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin.html" class="topbar-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    返回管理后台
  </a>
  <span style="color:var(--gray-200)">|</span>
  <div class="topbar-title">📄 DocuSeal 模板管理</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:.75rem" id="connBadge"></div>
</div>

<div class="page">

  <!-- One-click create all -->
  <div class="create-all-bar" id="createAllBar">
    <div class="info">
      <strong>一键创建所有模板</strong> — 自动在 DocuSeal 中创建合同和税务表格模板，并完成配置。已有模板不会重复创建。
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-orange" id="createAllBtn" onclick="createAllTemplates()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        一键创建
      </button>
      <button class="btn btn-secondary" id="forceRegenBtn" onclick="forceRegenerateAllTemplates()" title="强制重新生成所有已配置模板（包括已存在的），用于更新公司名称等内容">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        强制重新生成
      </button>
    </div>
  </div>
  <div class="progress-log" id="createLog" style="display:none"></div>

  <!-- Current config — all 16 template types in categories -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M17.66 17.66l-1.41-1.41M6.34 17.66l1.41-1.41"/></svg>
      当前使用的模板
    </div>
    <div id="cfgBody">
      <div style="text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.9rem">正在加载…</div>
    </div>
  </div>

  <!-- Upload new template -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传新模板 PDF
    </div>
    <div class="form-row">
      <div>
        <label>模板名称 <span style="color:var(--red)">*</span></label>
        <input type="text" id="uploadName" placeholder="如：Employee Contract Template 2026">
      </div>
      <div>
        <label>类别（上传后自动设置）</label>
        <select id="uploadCategory" style="width:100%">
          <option value="">— 不自动分配 —</option>
          <optgroup label="合同">
            <option value="company_contract_template_id">公司合同</option>
            <option value="worker_1099_template_id">劳务合同 — 1099</option>
            <option value="worker_w2_template_id">劳务合同 — W2</option>
          </optgroup>
          <optgroup label="税务表格">
            <option value="w4_template_id">W-4</option>
            <option value="w9_template_id">W-9</option>
            <option value="w8ben_template_id">W-8BEN</option>
            <option value="w8bene_template_id">W-8BEN-E</option>
            <option value="form8233_template_id">8233</option>
            <option value="i9_template_id">I-9</option>
            <option value="w7_template_id">W-7</option>
          </optgroup>
          <optgroup label="付款授权表格">
            <option value="ach_auth_template_id">ACH / Direct Deposit</option>
            <option value="wire_auth_template_id">Wire Transfer (ZH+EN)</option>
            <option value="wire_auth_en_template_id">Wire Transfer (EN)</option>
            <option value="wire_auth_es_template_id">Wire Transfer (EN+ES)</option>
            <option value="check_instruction_template_id">Check / 支票 (ZH+EN)</option>
            <option value="check_instruction_en_template_id">Check / 支票 (EN)</option>
            <option value="check_instruction_es_template_id">Check / 支票 (EN+ES)</option>
            <option value="zelle_auth_template_id">Zelle (中英 ZH+EN)</option>
            <option value="zelle_auth_en_template_id">Zelle (英文 EN)</option>
            <option value="zelle_auth_es_template_id">Zelle (英西 EN+ES)</option>
            <option value="third_party_pay_template_id">PayPal / Venmo / CashApp</option>
            <option value="cash_receipt_template_id">现金签收</option>
          </optgroup>
          <optgroup label="第三方平台 / Third-Party Pay">
            <option value="third_party_pay_template_id">Third-Party Pay (ZH+EN)</option>
            <option value="third_party_pay_en_template_id">Third-Party Pay (EN)</option>
            <option value="third_party_pay_es_template_id">Third-Party Pay (EN+ES)</option>
          </optgroup>
          <optgroup label="发票 / Invoice">
            <option value="contractor_invoice_template_id">承包商發票 (ZH+EN)</option>
            <option value="contractor_invoice_en_template_id">承包商發票 (EN)</option>
            <option value="contractor_invoice_es_template_id">承包商發票 (EN+ES)</option>
            <option value="invoice_approval_template_id">发票审批表 (ZH+EN) 内部</option>
            <option value="invoice_approval_en_template_id">发票审批表 (EN) 内部</option>
            <option value="invoice_approval_es_template_id">发票审批表 (EN+ES) 内部</option>
          </optgroup>
        </select>
      </div>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept=".pdf,application/pdf" id="fileInput" onchange="onFileSelect(this)">
      <div class="dropzone-icon">📂</div>
      <div>点击或拖拽 PDF 文件到此处</div>
      <div id="fileName" class="dropzone-name" style="display:none"></div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:.75rem;align-items:center">
      <button class="btn btn-sky" id="uploadBtn" onclick="uploadTemplate()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        上传至 DocuSeal
      </button>
      <span id="uploadStatus" style="font-size:.83rem;color:var(--gray-500)"></span>
    </div>
  </div>

  <!-- All templates from DocuSeal -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:.5rem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        所有模板
      </div>
      <button class="btn btn-outline" style="font-size:.78rem;padding:.3rem .7rem" onclick="loadAllTemplates()">↺ 刷新</button>
    </div>
    <div id="allTemplatesWrap">
      <div style="text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.9rem">正在加载…</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const TEMPLATE_DEFS = [

];

let _config = {};
let _allTemplates = []; // all templates from DocuSeal API
let _dsUrl = '';

async function api(path, opts={}) {
  const r = await fetch(path, { credentials: 'include', headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) }, ...opts });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3500);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Load config ──
async function loadConfig() {
  try {
    _config = await api('/api/admin/docuseal/config');
    _dsUrl = _config.url || '';
    const connBadge = document.getElementById('connBadge');
    if (_config.connected) {
      connBadge.innerHTML = `<span class="badge badge-green">✓ 已连接 DocuSeal</span>`
        + (_dsUrl ? ` <span style="font-size:.78rem;color:var(--gray-400)">${escHtml(_dsUrl)}</span>` : '')
        + ` <button class="btn-link" onclick="recheckConn()">重新检测</button>`;
    } else {
      connBadge.innerHTML = `<span class="badge badge-red">✗ 未连接</span>`
        + ` <button class="btn-link" onclick="recheckConn()">重新检测</button>`;
    }
    renderCfgBody();
  } catch(e) { toast(e.message, 'error'); }
}

async function recheckConn() {
  toast('正在检测连接…');
  await loadConfig();
  await loadAllTemplates();
  toast('检测完成', 'success');
}

// ── Render config body (all 16 types in categories) ──
function renderCfgBody() {
  const cats = [...new Set(TEMPLATE_DEFS.map(t => t.cat))];
  let html = '';
  for (const cat of cats) {
    const items = TEMPLATE_DEFS.filter(t => t.cat === cat);
    const icon = items[0].catIcon;
    html += `<div class="cat-label"><span>${icon}</span> ${escHtml(cat)}</div>`;
    html += `<div class="cfg-grid">`;
    for (const def of items) {
      const rawId = _config[def.key];
      const curId = Array.isArray(rawId) ? (rawId[0] || null) : rawId;
      const curTmpl = curId ? _allTemplates.find(t => t.id == curId) : null;
      const optHtml = _allTemplates.map(t =>
        `<option value="${t.id}"${t.id == curId ? ' selected' : ''}>#${t.id} — ${escHtml(t.name||'')}</option>`
      ).join('');
      const infoText = curId
        ? (curTmpl ? `发送${escHtml(def.label)}时使用此模板` : `已设置 #${curId}（未在列表中）`)
        : '';
      const regenBtn = def.type
        ? `<button class="btn btn-outline" style="font-size:.72rem;padding:.22rem .6rem;margin-top:.35rem"
             onclick="regenTemplate('${def.type}','${escHtml(def.label)}')">↺ 重新生成</button>`
        : '';
      html += `<div class="cfg-card">
        <div class="cfg-card-title">${escHtml(def.label)}</div>
        <div class="cfg-card-sub">${escHtml(def.desc)}</div>
        <select class="tmpl-select" onchange="setTemplate('${def.key}', this.value)">
          <option value="">— 未设置 —</option>
          ${optHtml}
        </select>
        <div class="cfg-card-info">${infoText}</div>
        ${regenBtn}
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('cfgBody').innerHTML = html;
}

// ── Load all templates from DocuSeal ──
async function loadAllTemplates() {
  const wrap = document.getElementById('allTemplatesWrap');
  try {
    _allTemplates = await api('/api/admin/docuseal/templates');
    if (!Array.isArray(_allTemplates)) _allTemplates = [];
    renderCfgBody();
    renderAllTemplates();
  } catch(e) {
    _allTemplates = [];
    renderCfgBody();
    wrap.innerHTML = `<div style="text-align:center;padding:1.5rem;color:var(--red);font-size:.88rem">${escHtml(e.message)}</div>`;
  }
}

function renderAllTemplates() {
  const wrap = document.getElementById('allTemplatesWrap');
  if (!_allTemplates.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--gray-400);font-size:.9rem">暂无模板 — 请在上方上传或使用「一键创建」</div>';
    return;
  }

  // Build a map of which keys use each template ID
  const usedBy = {};
  TEMPLATE_DEFS.forEach(def => {
    const raw = _config[def.key];
    const ids = Array.isArray(raw) ? raw : (raw ? [raw] : []);
    ids.forEach(id => {
      if (!usedBy[id]) usedBy[id] = [];
      usedBy[id].push(def.label);
    });
  });

  const rows = _allTemplates.map(t => {
    const labels = (usedBy[t.id] || []).map(l =>
      `<span style="display:inline-block;background:#e0f2fe;color:#0369a1;border-radius:4px;padding:1px 7px;font-size:.72rem;font-weight:600;margin-left:.3rem">${escHtml(l)}</span>`
    ).join('');
    const createdAt = t.created_at ? String(t.created_at).slice(0,10) : '—';
    return `<div class="tmpl-row">
      <div class="tmpl-row-info">
        <div class="tmpl-row-name">${escHtml(t.name||'(无名称)')}${labels}</div>
        <div class="tmpl-row-meta">DocuSeal #${t.id} · ${createdAt}</div>
      </div>
      <div class="tmpl-row-actions">
        <button class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem"
          onclick="renameTemplate(${t.id}, '${escHtml(String(t.name||'')).replace(/'/g,"\\'")}')">改名</button>
        <button class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem" onclick="previewTemplatePdf(${t.id})">预览 PDF</button>
        <button class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem" onclick="openBuilderModal(${t.id})">编辑</button>
        <button class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem;color:var(--red);border-color:#fca5a5"
          onclick="deleteTemplate(${t.id}, '${escHtml(String(t.name||'')).replace(/'/g,"\\'")}')">删除</button>
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = rows;
}

// ── Set template ──
async function setTemplate(key, id) {
  try {
    const body = { [key]: id || null };
    await api('/api/admin/docuseal/config', { method: 'POST', body: JSON.stringify(body) });
    _config[key] = id || null;
    renderCfgBody();
    renderAllTemplates();
    toast('已保存', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Regenerate a single built-in template ──
async function regenTemplate(type, label) {
  if (!confirm(`重新生成「${label}」？\n\n这会在 DocuSeal 中创建一个新模板并自动更新配置。旧模板不会被删除。`)) return;
  toast(`正在生成「${label}」…`);
  try {
    const r = await api('/api/admin/docuseal/create-html-template', {
      method: 'POST',
      body: JSON.stringify({ type })
    });
    toast(`✅ 「${label}」已重新生成 (ID: ${r.template_id})`, 'success');
    await loadAllTemplates();
  } catch(e) {
    toast(`生成失败: ${e.message}`, 'error');
  }
}

// ── Create all templates ──
async function createAllTemplates() {
  const btn = document.getElementById('createAllBtn');
  const log = document.getElementById('createLog');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 创建中…';
  log.style.display = 'block';
  log.innerHTML = '<div>开始创建模板…</div>';
  try {
    const result = await api('/api/admin/docuseal/create-all-templates', {
      method: 'POST',
      body: JSON.stringify({})
    });
    let okCount = 0, skipCount = 0, errCount = 0;
    (result.results || []).forEach(r => {
      if (r.success) {
        log.innerHTML += `<div class="ok">✓ ${escHtml(r.name)} — 创建成功 (ID: ${r.template_id})</div>`;
        okCount++;
      } else if (r.skipped) {
        log.innerHTML += `<div class="skip">⏭ ${escHtml(r.type)} — 已存在 (ID: ${r.template_id})</div>`;
        skipCount++;
      } else {
        log.innerHTML += `<div class="err">✗ ${escHtml(r.type)} — ${escHtml(r.error)}</div>`;
        errCount++;
      }
    });
    log.innerHTML += `<div style="margin-top:4px;font-weight:600">完成: ${okCount} 个新建, ${skipCount} 个已存在, ${errCount} 个失败</div>`;
    toast(`模板创建完成: ${okCount} 个新建`, 'success');
    await loadConfig();
    await loadAllTemplates();
  } catch(e) {
    log.innerHTML += `<div class="err">✗ 创建失败: ${escHtml(e.message)}</div>`;
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> 一键创建`;
  }
}

// ── Force regenerate all templates (even already configured ones) ──
async function forceRegenerateAllTemplates() {
  if (!confirm('将重新生成所有已配置模板（包括已存在的），使其反映最新公司名称等内容。确认继续？')) return;
  const btn = document.getElementById('forceRegenBtn');
  const log = document.getElementById('createLog');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 重新生成中…';
  log.style.display = 'block';
  log.innerHTML = '<div>开始强制重新生成所有模板…</div>';
  try {
    const result = await api('/api/admin/docuseal/create-all-templates', {
      method: 'POST',
      body: JSON.stringify({ force: true })
    });
    let okCount = 0, skipCount = 0, errCount = 0;
    (result.results || []).forEach(r => {
      if (r.success) {
        log.innerHTML += `<div class="ok">✓ ${escHtml(r.name)} — 重新生成成功 (ID: ${r.template_id})</div>`;
        okCount++;
      } else if (r.skipped) {
        log.innerHTML += `<div class="skip">⏭ ${escHtml(r.type)} — 跳过</div>`;
        skipCount++;
      } else {
        log.innerHTML += `<div class="err">✗ ${escHtml(r.type)} — ${escHtml(r.error)}</div>`;
        errCount++;
      }
    });
    log.innerHTML += `<div style="margin-top:4px;font-weight:600">完成: ${okCount} 个重新生成, ${skipCount} 个跳过, ${errCount} 个失败</div>`;
    toast(`模板重新生成完成: ${okCount} 个成功`, 'success');
    await loadConfig();
    await loadAllTemplates();
  } catch(e) {
    log.innerHTML += `<div class="err">✗ 失败: ${escHtml(e.message)}</div>`;
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg> 强制重新生成`;
  }
}

// ── Rename template (via DocuSeal API + local DB) ──
async function renameTemplate(dsId, currentName) {
  const newName = await showPromptModal('重命名模板', currentName);
  if (!newName || newName.trim() === currentName) return;
  try {
    await api(`/api/admin/docuseal/templates/${dsId}/rename`, { method: 'PUT', body: JSON.stringify({ name: newName.trim() }) });
    const t = _allTemplates.find(t => t.id === dsId);
    if (t) t.name = newName.trim();
    renderCfgBody();
    renderAllTemplates();
    toast('模板已改名', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Delete template (from DocuSeal + config) ──
async function deleteTemplate(dsId, name) {
  if (!confirm(`确定要删除模板「${name}」吗？\n\n这会从 DocuSeal 中永久删除此模板，不可撤销。`)) return;
  try {
    await api(`/api/admin/docuseal/templates/${dsId}`, { method: 'DELETE' });
    TEMPLATE_DEFS.forEach(def => { if (_config[def.key] == dsId) _config[def.key] = null; });
    _allTemplates = _allTemplates.filter(t => t.id !== dsId);
    renderCfgBody();
    renderAllTemplates();
    toast('模板已删除', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── File upload ──
let _fileData = null;

function onFileSelect(inp) {
  const file = inp.files[0];
  if (!file) return;
  const fn = document.getElementById('fileName');
  fn.textContent = `📄 ${file.name}  (${(file.size/1024).toFixed(0)} KB)`;
  fn.style.display = 'block';
  const nameInp = document.getElementById('uploadName');
  if (!nameInp.value) nameInp.value = file.name.replace(/\.pdf$/i, '');
  const reader = new FileReader();
  reader.onload = e => {
    _fileData = e.target.result;
    document.getElementById('uploadBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    const dt = new DataTransfer(); dt.items.add(file);
    const inp = document.getElementById('fileInput'); inp.files = dt.files;
    onFileSelect(inp);
  } else toast('请上传 PDF 文件', 'error');
});

async function uploadTemplate() {
  const name = document.getElementById('uploadName').value.trim();
  const category = document.getElementById('uploadCategory').value;
  if (!name) { toast('请填写模板名称', 'error'); return; }
  if (!_fileData) { toast('请选择 PDF 文件', 'error'); return; }
  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 上传中…';
  status.textContent = '';
  try {
    const result = await api('/api/admin/docuseal/upload-template', {
      method: 'POST',
      body: JSON.stringify({ name, file: _fileData, category })
    });
    if (category && result.id) {
      try {
        await api('/api/admin/docuseal/config', {
          method: 'POST',
          body: JSON.stringify({ [category]: result.id })
        });
        _config[category] = result.id;
        // Immediately add to _allTemplates so dropdown reflects the new template
        // even before DocuSeal's list API returns it
        if (!_allTemplates.find(t => t.id == result.id)) {
          _allTemplates.push({ id: result.id, name, created_at: new Date().toISOString() });
        }
        renderCfgBody();
        renderAllTemplates();
        const def = TEMPLATE_DEFS.find(d => d.key === category);
        toast(`模板「${name}」上传成功，已分配至「${def ? def.label : category}」`, 'success');
      } catch(e2) {
        toast(`上传成功，但分配类别失败: ${e2.message}`, 'error');
      }
    } else {
      toast(`模板「${name}」上传成功`, 'success');
    }
    status.textContent = '✓ 上传成功';
    document.getElementById('uploadName').value = '';
    document.getElementById('uploadCategory').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('fileName').style.display = 'none';
    _fileData = null;
    btn.disabled = true;
    await loadAllTemplates();
  } catch(e) {
    toast(e.message, 'error');
    status.textContent = '✗ ' + e.message;
  } finally {
    btn.disabled = !_fileData;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 上传至 DocuSeal`;
  }
}

// ── Preview template PDF ──
function previewTemplatePdf(dsId) {
  window.open(`/api/admin/docuseal/templates/${dsId}/preview-pdf`, '_blank');
}

// ── Embedded builder modal ──
let _builderScriptSrc = null;

async function openBuilderModal(dsId) {
  const overlay = document.getElementById('builderModal');
  const body    = document.getElementById('builderBody');
  const titleEl = document.getElementById('builderTitle');
  const tmpl    = _allTemplates.find(t => t.id === dsId);
  titleEl.textContent = `编辑模板: ${tmpl ? tmpl.name : '#' + dsId}`;
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:.9rem">正在加载编辑器…</div>';
  overlay.classList.add('open');
  try {
    const { token, builderSrc } = await api(`/api/admin/docuseal/builder-token/${dsId}`);
    // Load the DocuSeal builder script once
    if (_builderScriptSrc !== builderSrc) {
      const old = document.querySelector('script[data-dsbuilder]');
      if (old) old.remove();
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = builderSrc;
        s.dataset.dsbuilder = '1';
        s.onload = resolve;
        s.onerror = () => reject(new Error('无法加载 DocuSeal 编辑器脚本: ' + builderSrc));
        document.head.appendChild(s);
      });
      _builderScriptSrc = builderSrc;
    }
    body.innerHTML = `<docuseal-builder data-token="${escHtml(token)}" data-language="zh" style="width:100%;height:100%;display:block"></docuseal-builder>`;
  } catch(e) {
    body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:.75rem;color:#ef4444;padding:2rem;text-align:center"><strong>编辑器加载失败</strong><div style="font-size:.85rem;color:#64748b">${escHtml(e.message)}</div></div>`;
    toast('编辑器加载失败: ' + e.message, 'error');
  }
}

function closeBuilderModal() {
  document.getElementById('builderModal').classList.remove('open');
  document.getElementById('builderBody').innerHTML = '';
}

// ── Init ──
async function init() {
  await loadConfig();
  await loadAllTemplates();
}
init();

// ── Custom prompt modal ──
function showPromptModal(title, defaultValue = '') {
  return new Promise(resolve => {
    const overlay = document.getElementById('promptModal');
    const input   = document.getElementById('promptInput');
    const okBtn   = document.getElementById('promptOk');
    const cancelBtn = document.getElementById('promptCancel');

    document.getElementById('promptTitle').textContent = title;
    input.value = defaultValue;
    overlay.classList.add('open');

    // focus + select all after transition
    setTimeout(() => { input.focus(); input.select(); }, 180);

    function finish(val) {
      overlay.classList.remove('open');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(val);
    }
    function onOk()    { finish(input.value); }
    function onCancel(){ finish(null); }
    function onKey(e)  { if (e.key === 'Enter') finish(input.value); else if (e.key === 'Escape') finish(null); }

    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}
