<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DocuSeal 模板管理</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
  :root{--sky:#0ea5e9;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--radius:10px}
  a{color:var(--sky);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Layout */
  .topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem}
  .topbar-title{font-size:1.1rem;font-weight:700;color:#1e293b}
  .topbar-back{font-size:.85rem;color:var(--gray-500);display:flex;align-items:center;gap:.35rem}
  .topbar-back:hover{color:var(--sky)}
  .page{max-width:960px;margin:2rem auto;padding:0 1.5rem 4rem}

  /* Cards */
  .card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:1.5rem;margin-bottom:1.5rem}
  .card-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  .card-title svg{flex-shrink:0}

  /* Status badge */
  .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.78rem;font-weight:600}
  .badge-green{background:#d1fae5;color:#065f46}
  .badge-red{background:#fee2e2;color:#991b1b}
  .badge-gray{background:#f1f5f9;color:var(--gray-600)}
  .badge-orange{background:#fff7ed;color:#9a3412}

  /* Forms */
  label{display:block;font-size:.83rem;font-weight:600;color:var(--gray-600);margin-bottom:.35rem}
  input[type=text],input[type=file]{width:100%;border:1px solid var(--gray-200);border-radius:6px;padding:.5rem .75rem;font-size:.88rem;outline:none;transition:border .15s}
  input[type=text]:focus{border-color:var(--sky)}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.1rem;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-sky{background:var(--sky);color:#fff}
  .btn-sky:hover:not(:disabled){opacity:.88}
  .btn-red{background:var(--red);color:#fff}
  .btn-red:hover:not(:disabled){opacity:.88}
  .btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200)}
  .btn-outline:hover:not(:disabled){background:var(--gray-50)}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover:not(:disabled){opacity:.88}

  /* Config cards */
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media(max-width:640px){.cfg-grid{grid-template-columns:1fr}}
  .cfg-card{border:1px solid var(--gray-200);border-radius:8px;padding:1rem}
  .cfg-card-title{font-size:.88rem;font-weight:700;margin-bottom:.5rem}
  .cfg-card-id{font-family:monospace;font-size:.9rem;color:var(--sky);font-weight:600}
  .cfg-card-name{font-size:.82rem;color:var(--gray-500);margin-top:.2rem}

  /* Templates table */
  .tbl{width:100%;border-collapse:collapse;font-size:.85rem}
  .tbl th{padding:8px 10px;text-align:left;background:var(--gray-50);color:var(--gray-600);font-weight:600;border-bottom:2px solid var(--gray-200);white-space:nowrap}
  .tbl td{padding:8px 10px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr:hover td{background:#f8fafc}
  .tbl-wrap{overflow-x:auto}

  /* Role chips */
  .role-chip{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:4px;padding:1px 7px;font-size:.73rem;font-weight:600;margin:1px 2px}

  /* Use-as buttons */
  .use-btn{font-size:.75rem;padding:.22rem .6rem;border-radius:5px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;color:var(--gray-600);transition:all .15s}
  .use-btn:hover{border-color:var(--sky);color:var(--sky);background:#f0f9ff}
  .use-btn.active{border-color:var(--green);color:#fff;background:var(--green)}

  /* Upload drop zone */
  .dropzone{border:2px dashed var(--gray-200);border-radius:8px;padding:2rem;text-align:center;color:var(--gray-400);transition:all .2s;cursor:pointer;position:relative}
  .dropzone.drag-over{border-color:var(--sky);background:#f0f9ff;color:var(--sky)}
  .dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .dropzone-icon{font-size:2rem;margin-bottom:.5rem}
  .dropzone-name{font-size:.88rem;color:#1e293b;font-weight:600;margin-top:.5rem}

  /* Empty state */
  .empty{text-align:center;padding:2.5rem;color:var(--gray-400);font-size:.9rem}

  /* Spinner */
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Toast */
  #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:#fff;padding:.7rem 1.2rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;max-width:320px}
  #toast.show{opacity:1}
  #toast.error{background:#ef4444}
  #toast.success{background:#10b981}
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin.html" class="topbar-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    返回管理后台
  </a>
  <span style="color:var(--gray-200)">|</span>
  <div class="topbar-title">📄 DocuSeal 模板管理</div>
  <div style="margin-left:auto" id="connBadge"></div>
</div>

<div class="page">

  <!-- Current config -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M17.66 17.66l-1.41-1.41M6.34 17.66l1.41-1.41"/></svg>
      当前使用的模板配置
    </div>
    <div class="cfg-grid" id="cfgGrid">
      <div class="cfg-card"><div class="cfg-card-title">员工合同模板</div><div class="cfg-card-id" id="cfgContractId">—</div><div class="cfg-card-name" id="cfgContractName"></div></div>
      <div class="cfg-card"><div class="cfg-card-title">W-9 表格模板</div><div class="cfg-card-id" id="cfgW9Id">—</div><div class="cfg-card-name" id="cfgW9Name"></div></div>
    </div>
    <p style="font-size:.8rem;color:var(--gray-400);margin-top:.75rem">在下方模板列表中点击「设为合同模板」或「设为 W-9 模板」来更改。</p>
  </div>

  <!-- Upload new template -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传新模板 PDF
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:end;margin-bottom:1rem">
      <div>
        <label>模板名称 <span style="color:var(--red)">*</span></label>
        <input type="text" id="uploadName" placeholder="如：Employee Contract Template 2026">
      </div>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept=".pdf,application/pdf" id="fileInput" onchange="onFileSelect(this)">
      <div class="dropzone-icon">📂</div>
      <div>点击或拖拽 PDF 文件到此处</div>
      <div id="fileName" class="dropzone-name" style="display:none"></div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:.75rem;align-items:center">
      <button class="btn btn-sky" id="uploadBtn" onclick="uploadTemplate()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        上传至 DocuSeal
      </button>
      <span id="uploadStatus" style="font-size:.83rem;color:var(--gray-500)"></span>
    </div>
  </div>

  <!-- Templates list -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      <span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        DocuSeal 中的所有模板
      </span>
      <button class="btn btn-outline" style="font-size:.8rem;padding:.3rem .8rem" onclick="loadTemplates()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        刷新
      </button>
    </div>
    <div id="templatesWrap">
      <div class="empty">正在加载…</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
let _config = {};
let _templates = [];

async function api(path, opts={}) {
  const r = await fetch(path, { credentials: 'include', headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) }, ...opts });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

// ── Load config ──
async function loadConfig() {
  try {
    _config = await api('/api/admin/docuseal/config');
    const connBadge = document.getElementById('connBadge');
    if (_config.connected) {
      connBadge.innerHTML = `<span class="badge badge-green">✓ 已连接 DocuSeal</span>`;
      if (_config.url) connBadge.innerHTML += ` <span style="font-size:.78rem;color:var(--gray-400)">${escHtml(_config.url)}</span>`;
    } else {
      connBadge.innerHTML = `<span class="badge badge-red">✗ 未连接 — 请检查 .env 中 DOCUSEAL_API_KEY / DOCUSEAL_URL</span>`;
    }
    renderConfig();
  } catch(e) { toast(e.message, 'error'); }
}

function renderConfig() {
  const t = _templates;
  const findName = id => id ? (t.find(x => x.id == id)?.name || `ID ${id}`) : null;
  const cId = _config.contract_template_id;
  const wId = _config.w9_template_id;
  document.getElementById('cfgContractId').textContent = cId ? `Template #${cId}` : '未设置';
  document.getElementById('cfgContractName').textContent = findName(cId) || '';
  document.getElementById('cfgW9Id').textContent = wId ? `Template #${wId}` : '未设置';
  document.getElementById('cfgW9Name').textContent = findName(wId) || '';
}

// ── Load templates ──
async function loadTemplates() {
  const wrap = document.getElementById('templatesWrap');
  wrap.innerHTML = '<div class="empty">正在从 DocuSeal 加载…</div>';
  try {
    _templates = await api('/api/admin/docuseal/templates');
    renderConfig(); // refresh names now we have templates
    renderTemplates();
  } catch(e) {
    wrap.innerHTML = `<div class="empty" style="color:var(--red)">${escHtml(e.message)}</div>`;
  }
}

function renderTemplates() {
  const wrap = document.getElementById('templatesWrap');
  if (!_templates.length) {
    wrap.innerHTML = '<div class="empty">DocuSeal 中暂无模板<br><small>请在上方上传第一个模板</small></div>';
    return;
  }
  const rows = _templates.map(t => {
    const roles = (t.submitters || t.schema || []).map(s => {
      const name = s.name || s.role || '';
      return name ? `<span class="role-chip">${escHtml(name)}</span>` : '';
    }).join('');
    const isContract = _config.contract_template_id == t.id;
    const isW9 = _config.w9_template_id == t.id;
    const docusealUrl = (_config.url || '') + '/templates/' + t.id;
    return `<tr>
      <td style="font-weight:600;min-width:180px">
        ${escHtml(t.name || '—')}
        ${isContract ? '<span class="badge badge-green" style="font-size:.7rem;margin-left:.4rem">合同</span>' : ''}
        ${isW9 ? '<span class="badge badge-orange" style="font-size:.7rem;margin-left:.4rem">W-9</span>' : ''}
      </td>
      <td style="font-family:monospace;color:var(--gray-500)">#${t.id}</td>
      <td>${roles || '<span style="color:var(--gray-400);font-size:.8rem">—</span>'}</td>
      <td style="color:var(--gray-400);font-size:.8rem;white-space:nowrap">${t.created_at ? t.created_at.slice(0,10) : '—'}</td>
      <td style="white-space:nowrap">
        <button class="use-btn${isContract?' active':''}" onclick="setTemplate('contract',${t.id})" title="设为员工合同模板">
          ${isContract ? '✓ 合同模板' : '设为合同模板'}
        </button>
        <button class="use-btn${isW9?' active':''}" onclick="setTemplate('w9',${t.id})" style="margin-left:.3rem" title="设为 W-9 模板">
          ${isW9 ? '✓ W-9 模板' : '设为 W-9 模板'}
        </button>
      </td>
      <td style="white-space:nowrap">
        ${_config.url ? `<a href="${docusealUrl}" target="_blank" class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem">在 DocuSeal 中查看 ↗</a>` : ''}
        <button class="btn btn-outline" style="font-size:.75rem;padding:.22rem .6rem;margin-left:.3rem;color:var(--red);border-color:#fca5a5" onclick="deleteTemplate(${t.id},'${escAttr(t.name||'')}')">删除</button>
      </td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>
      <th>模板名称</th><th>ID</th><th>签署角色</th><th>创建日期</th><th>设为默认</th><th>操作</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── Set template as default ──
async function setTemplate(type, id) {
  try {
    const body = type === 'contract' ? { contract_template_id: id } : { w9_template_id: id };
    await api('/api/admin/docuseal/config', { method: 'POST', body: JSON.stringify(body) });
    if (type === 'contract') _config.contract_template_id = id;
    else _config.w9_template_id = id;
    renderConfig();
    renderTemplates();
    toast(`已设置为 ${type === 'contract' ? '员工合同' : 'W-9'} 默认模板`, 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Delete template ──
async function deleteTemplate(id, name) {
  if (!confirm(`确定要删除模板「${name}」(#${id}) 吗？\n此操作不可撤销。`)) return;
  try {
    await api(`/api/admin/docuseal/templates/${id}`, { method: 'DELETE' });
    if (_config.contract_template_id == id) _config.contract_template_id = null;
    if (_config.w9_template_id == id) _config.w9_template_id = null;
    _templates = _templates.filter(t => t.id != id);
    renderConfig();
    renderTemplates();
    toast('模板已删除', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── File upload ──
let _fileData = null;

function onFileSelect(inp) {
  const file = inp.files[0];
  if (!file) return;
  const fn = document.getElementById('fileName');
  fn.textContent = `📄 ${file.name}  (${(file.size/1024).toFixed(0)} KB)`;
  fn.style.display = 'block';
  // Auto-fill name if empty
  const nameInp = document.getElementById('uploadName');
  if (!nameInp.value) nameInp.value = file.name.replace(/\.pdf$/i, '');
  const reader = new FileReader();
  reader.onload = e => {
    _fileData = e.target.result; // data:application/pdf;base64,...
    document.getElementById('uploadBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

// Drag-and-drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    const dt = new DataTransfer(); dt.items.add(file);
    const inp = document.getElementById('fileInput'); inp.files = dt.files;
    onFileSelect(inp);
  } else toast('请上传 PDF 文件', 'error');
});

async function uploadTemplate() {
  const name = document.getElementById('uploadName').value.trim();
  if (!name) { toast('请填写模板名称', 'error'); return; }
  if (!_fileData) { toast('请选择 PDF 文件', 'error'); return; }
  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 上传中…';
  status.textContent = '';
  try {
    const result = await api('/api/admin/docuseal/upload-template', {
      method: 'POST',
      body: JSON.stringify({ name, file: _fileData })
    });
    toast(`模板「${name}」上传成功 (ID: ${result.id})`, 'success');
    status.textContent = `✓ 成功 — Template ID: ${result.id}`;
    // Reset form
    document.getElementById('uploadName').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('fileName').style.display = 'none';
    _fileData = null;
    await loadTemplates();
  } catch(e) {
    toast(e.message, 'error');
    status.textContent = '✗ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 上传至 DocuSeal`;
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ── Init ──
loadConfig();
loadTemplates();
</script>
</body>
</html>
