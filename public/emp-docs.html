<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Anchor Point</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --sky:#0ea5e9;--sky-d:#0284c7;--green:#22c55e;--red:#ef4444;--blue:#0F2B5B;
    --gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-800:#1f2937;
    --radius:10px;--tr:all .2s;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f7ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
  .card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(14,165,233,.1);width:100%;max-width:560px;padding:2rem;margin-bottom:1.5rem}
  .logo{font-size:1.4rem;font-weight:800;color:var(--blue);text-align:center;margin-bottom:.2rem;letter-spacing:-.5px}
  .logo span{color:var(--sky)}
  .subtitle{text-align:center;color:var(--gray-400);font-size:.83rem;margin-bottom:1.5rem}
  h2{font-size:1rem;font-weight:700;color:var(--gray-800);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--gray-200);display:flex;align-items:center;gap:.4rem}
  .notice{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:#1E40AF;line-height:1.6;margin-bottom:1.2rem}
  .notice strong{display:block;margin-bottom:.2rem}
  .upload-zone{border:2px dashed var(--gray-200);border-radius:10px;padding:1.4rem;text-align:center;cursor:pointer;transition:var(--tr);position:relative;margin-bottom:.5rem}
  .upload-zone:hover{border-color:var(--sky);background:#f0f9ff}
  .upload-zone.done{border-color:var(--green);background:#f0fdf4}
  .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{font-size:2rem;margin-bottom:.4rem}
  .upload-label{font-size:.88rem;font-weight:600;color:var(--gray-600)}
  .upload-hint{font-size:.75rem;color:var(--gray-400);margin-top:.25rem}
  .upload-done{display:none;font-size:.82rem;font-weight:600;color:var(--green);margin-top:.3rem}
  .upload-zone.done .upload-done{display:block}
  .upload-zone.done .upload-label{color:var(--green)}
  .doc-block{margin-bottom:1.4rem}
  .doc-title{font-size:.88rem;font-weight:700;color:var(--gray-700);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
  .doc-desc{font-size:.78rem;color:var(--gray-500);margin-bottom:.55rem;line-height:1.5}
  .btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:var(--tr)}
  .btn-submit{background:var(--sky);color:#fff}
  .btn-submit:hover{background:var(--sky-d)}
  .btn-submit:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}
  .error-msg{color:var(--red);font-size:.85rem;text-align:center;margin-top:.75rem;display:none}
  .screen{display:none}
  .screen.active{display:block}
  #screenLoading{text-align:center;padding:3rem 0;color:var(--gray-400)}
  .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success-icon{font-size:3.5rem;text-align:center;margin:1rem 0 .5rem}
  .success-title{font-size:1.2rem;font-weight:800;color:var(--green);text-align:center;margin-bottom:.5rem}
  .success-body{font-size:.88rem;color:var(--gray-500);text-align:center;line-height:1.6}
  .tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.75rem;font-weight:700;background:#EFF6FF;color:var(--sky)}
  .emp-header{display:flex;align-items:center;gap:.85rem;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--gray-200)}
  .emp-avatar{width:46px;height:46px;border-radius:50%;background:var(--sky);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;flex-shrink:0}
  .emp-name{font-size:1.05rem;font-weight:700;color:var(--blue)}
  .emp-code{font-size:.8rem;color:var(--gray-400);margin-top:1px}
  .admin-note{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:.7rem .9rem;font-size:.83rem;color:#92400E;line-height:1.6;margin-bottom:1.2rem}
  .admin-note strong{display:block;margin-bottom:.2rem;font-size:.78rem;text-transform:uppercase;letter-spacing:.3px}
  .progress-bar{display:flex;gap:.4rem;margin-bottom:1.5rem}
  .progress-dot{flex:1;height:4px;background:var(--gray-200);border-radius:2px;transition:background .3s}
  .progress-dot.done{background:var(--green)}
  .progress-dot.active{background:var(--sky)}
  /* Position self-rating */
  .pos-row{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--gray-100)}
  .pos-row:last-child{border-bottom:none}
  .pos-name{flex:1;font-size:.87rem;font-weight:600;color:var(--gray-800)}
  .pos-name small{display:block;font-size:.73rem;font-weight:400;color:var(--gray-400)}
  .interest-toggle{display:flex;align-items:center;gap:0}
  .int-btn{border:1px solid var(--gray-200);background:#fff;padding:4px 10px;font-size:.75rem;font-weight:600;cursor:pointer;transition:var(--tr)}
  .int-btn:first-child{border-radius:6px 0 0 6px;border-right:none}
  .int-btn:last-child{border-radius:0 6px 6px 0}
  .int-btn.active-yes{background:#d1fae5;border-color:var(--green);color:#065f46}
  .int-btn.active-no{background:#fee2e2;border-color:var(--red);color:#991b1b}
  .stars{display:flex;gap:2px}
  .star{font-size:1.2rem;cursor:pointer;line-height:1;transition:transform .1s;user-select:none}
  .star:hover,.star.lit{transform:scale(1.15)}
</style>
</head>
<body>

<div style="width:100%;max-width:560px;margin-bottom:.5rem">
  <div class="logo">Prime <span>Anchor</span>Point</div>
  <div class="subtitle" id="pageSubtitle"></div>
</div>

<!-- Loading -->
<div class="card screen active" id="screenLoading">
  <div class="spinner"></div>
  <div style="text-align:center;color:var(--gray-400);font-size:.9rem" id="loadingText"></div>
</div>

<!-- Invalid -->
<div class="card screen" id="screenInvalid">
  <div style="text-align:center;padding:1.5rem 0">
    <div style="font-size:3rem;margin-bottom:.75rem">🔒</div>
    <div style="font-size:1.1rem;font-weight:700;color:var(--red);margin-bottom:.5rem" id="invalidTitle"></div>
    <div style="font-size:.88rem;color:var(--gray-500)" id="invalidDesc"></div>
  </div>
</div>

<!-- Completed -->
<div class="card screen" id="screenCompleted">
  <div class="success-icon">✅</div>
  <div class="success-title" id="completedTitle"></div>
  <div class="success-body" id="completedBody"></div>
</div>

<!-- Main form -->
<div class="screen" id="screenForm">
  <div class="card">
    <div class="emp-header">
      <div class="emp-avatar" id="empAvatar">?</div>
      <div>
        <div class="emp-name" id="empName">—</div>
        <div class="emp-code" id="empCode"></div>
      </div>
    </div>
    <div class="notice">
      <strong id="noticeTitle"></strong>
      <span id="noticeBody"></span>
    </div>
    <div id="adminNoteBlock" class="admin-note" style="display:none">
      <strong id="adminNoteLabel"></strong>
      <span id="adminNoteText"></span>
    </div>
  </div>

  <div class="card" id="docFormCard">
    <h2 id="uploadHeading"></h2>
    <div class="progress-bar" id="progressBar"></div>
    <div id="docList"></div>

    <button class="btn btn-submit" id="btnSubmit" onclick="submitDocs()"></button>
    <div class="error-msg" id="errMsg"></div>
  </div>

  <!-- Position self-rating (shown only when positions included) -->
  <div class="card" id="positionCard" style="display:none">
    <h2 id="posHeading"></h2>
    <p id="posSubtitle" style="font-size:.82rem;color:var(--gray-500);margin-bottom:1rem;line-height:1.5"></p>
    <div id="positionList"></div>
  </div>
</div>

<!-- Success (after submit) -->
<div class="card screen" id="screenSuccess">
  <div class="success-icon">🎉</div>
  <div class="success-title" id="successTitle"></div>
  <div class="success-body" id="successBody"></div>
</div>

<div style="font-size:.72rem;color:var(--gray-400);text-align:center;margin-top:.5rem;padding-bottom:2rem" id="footerText"></div>

const DOC_ICONS = { gov_id: '🪪', ssn: '📋', work_card: '💼', w9: '📝' };
const DOC_ACCEPT = '.pdf,.jpg,.jpeg,.png,.heic,.heif';

const POS_LABELS = {
  warehouse_sorter: {zh:'仓库分拣员',en:'Warehouse Sorter',es:'Clasificador de almacén'},
  labeler:          {zh:'贴标员',en:'Labeler',es:'Etiquetador'},

  janitorial:       {zh:'清洁工',en:'Janitorial',es:'Personal de limpieza'},
  food_processing:  {zh:'食品加工',en:'Food Processing',es:'Procesamiento de alimentos'},
  warehouse_lead:   {zh:'仓库领班',en:'Warehouse Lead',es:'Líder de almacén'},
  loading_unloading:{zh:'装卸工',en:'Loading/Unloading',es:'Carga y descarga'},
  order_picker:     {zh:'拣货员',en:'Order Picker',es:'Selector de pedidos'},
  welder:           {zh:'焊接工',en:'Welder',es:'Soldador'},
};

const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
let LANG = params.get('lang') || 'zh';
let T = I18N[LANG] || I18N.zh;
let _requestedDocs = [];
let _positions = [];
const _fileMap = {};
const _posRatings = {};

function t(key) { return T[key] || I18N.zh[key] || key; }
function docT(key) { return (T.docs && T.docs[key]) || (I18N.zh.docs && I18N.zh.docs[key]) || { label: key, sub: '', desc: '' }; }

function applyLang() {
  document.title = t('pageTitle');
  document.documentElement.lang = LANG === 'es' ? 'es' : LANG === 'en' ? 'en' : 'zh';
  document.getElementById('pageSubtitle').textContent = t('subtitle');
  document.getElementById('loadingText').textContent = t('loading');
  document.getElementById('invalidTitle').textContent = t('invalidTitle');
  document.getElementById('invalidDesc').textContent = t('invalidDesc');
  document.getElementById('completedTitle').textContent = t('completedTitle');
  document.getElementById('completedBody').innerHTML = t('completedBody');
  document.getElementById('noticeTitle').textContent = t('noticeTitle');
  document.getElementById('noticeBody').textContent = t('noticeBody');
  document.getElementById('adminNoteLabel').textContent = t('adminNoteLabel');
  document.getElementById('uploadHeading').textContent = t('uploadHeading');
  document.getElementById('btnSubmit').textContent = t('btnSubmit');
  document.getElementById('posHeading').textContent = t('posHeading');
  document.getElementById('posSubtitle').textContent = t('posSubtitle');
  document.getElementById('successTitle').textContent = t('successTitle');
  document.getElementById('successBody').innerHTML = t('successBody');
  document.getElementById('footerText').textContent = t('footer');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function init() {
  applyLang();
  if (!TOKEN) { show('screenInvalid'); return; }
  try {
    const r = await fetch(`/api/emp-docs/${TOKEN}`);
    if (!r.ok) { show('screenInvalid'); return; }
    const d = await r.json();
    if (!params.get('lang') && d.lang) { LANG = d.lang; T = I18N[LANG] || I18N.zh; applyLang(); }
    if (d.status === 'completed') { show('screenCompleted'); return; }
    const initials = d.name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
    document.getElementById('empAvatar').textContent = initials;
    document.getElementById('empName').textContent = d.name;
    document.getElementById('empCode').textContent = d.emp_code ? t('empCodePrefix') + d.emp_code : '';
    if (d.admin_note) {
      document.getElementById('adminNoteText').textContent = d.admin_note;
      document.getElementById('adminNoteBlock').style.display = '';
    }
    _requestedDocs = d.requested_docs || ['gov_id','ssn','work_card'];
    _positions = d.positions || [];
    buildDocForm();
    if (_positions.length) buildPositionForm();
    show('screenForm');
  } catch(e) { show('screenInvalid'); }
}

function buildDocForm() {
  const pb = document.getElementById('progressBar');
  const dl = document.getElementById('docList');
  pb.innerHTML = _requestedDocs.map(k => `<div class="progress-dot" id="pd_${k}"></div>`).join('');
  dl.innerHTML = _requestedDocs.map(key => {
    const info = docT(key);
    const icon = DOC_ICONS[key] || '📄';
    const sub = info.sub ? ` <span style="font-size:.72rem;color:var(--gray-400);font-weight:400">${info.sub}</span>` : '';
    return `<div class="doc-block" id="block_${key}">
      <div class="doc-title">${icon} ${info.label}${sub}</div>
      <div class="doc-desc">${info.desc}</div>
      <div class="upload-zone" id="zone_${key}" onclick="document.getElementById('file_${key}').click()">
        <input type="file" id="file_${key}" name="${key}" accept="${DOC_ACCEPT}" style="display:none" onchange="onFileChange('${key}',this)">
        <div class="upload-icon" id="icon_${key}">⬆️</div>
        <div class="upload-label" id="lbl_${key}">${t('clickUpload')}</div>
        <div class="upload-hint">${t('uploadHint')}</div>
        <div class="upload-done" id="done_${key}"></div>
      </div>
    </div>`;
  }).join('');
}

function buildPositionForm() {
  document.getElementById('positionCard').style.display = '';
  const container = document.getElementById('positionList');
  container.innerHTML = _positions.map(key => {
    _posRatings[key] = { interest: null, skill: 0 };
    const label = (POS_LABELS[key] || {})[LANG] || key;
    const enLabel = (POS_LABELS[key] || {}).en || key;
    return `<div class="pos-row" id="posrow_${key}">
      <div class="pos-name">${label}${LANG!=='en'?`<small>${enLabel}</small>`:''}</div>
      <div class="interest-toggle">
        <button class="int-btn" id="yes_${key}" onclick="setInterest('${key}',true)">${t('interested')}</button>
        <button class="int-btn" id="no_${key}" onclick="setInterest('${key}',false)">${t('notInterested')}</button>
      </div>
      <div class="stars" id="stars_${key}">
        ${[1,2,3,4,5].map(n=>`<span class="star" id="star_${key}_${n}" onclick="setStar('${key}',${n})">☆</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function setInterest(key, val) {
  _posRatings[key] = _posRatings[key] || { interest: null, skill: 0 };
  _posRatings[key].interest = val;
  document.getElementById('yes_' + key).className = 'int-btn' + (val ? ' active-yes' : '');
  document.getElementById('no_' + key).className = 'int-btn' + (!val ? ' active-no' : '');
}

function setStar(key, n) {
  _posRatings[key] = _posRatings[key] || { interest: null, skill: 0 };
  _posRatings[key].skill = n;
  for (let i = 1; i <= 5; i++) {
    const s = document.getElementById(`star_${key}_${i}`);
    s.textContent = i <= n ? '★' : '☆';
    s.classList.toggle('lit', i <= n);
  }
}

function onFileChange(key, input) {
  const file = input.files[0];
  if (!file) return;
  _fileMap[key] = file;
  document.getElementById('zone_' + key).classList.add('done');
  document.getElementById('icon_' + key).textContent = '✅';
  document.getElementById('lbl_' + key).textContent = t('fileSelected');
  document.getElementById('done_' + key).textContent = file.name;
  const filled = _requestedDocs.filter(k => _fileMap[k]).length;
  _requestedDocs.forEach((k, i) => {
    const dot = document.getElementById('pd_' + k);
    if (_fileMap[k]) dot.classList.add('done');
    else if (i === filled) dot.classList.add('active');
  });
}

async function submitDocs() {
  const missing = _requestedDocs.filter(k => !_fileMap[k]);
  if (missing.length) {
    const labels = missing.map(k => docT(k).label).join(LANG === 'zh' ? '、' : ', ');
    showErr(t('errMissing') + labels);
    return;
  }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = t('btnUploading');
  hideErr();
  const fd = new FormData();
  for (const [key, file] of Object.entries(_fileMap)) fd.append(key, file);
  // Add position ratings if any were rated
  if (_positions.length) {
    const ratings = _positions
      .filter(k => _posRatings[k] && (_posRatings[k].interest !== null || _posRatings[k].skill > 0))
      .map(k => ({ key: k, interest: !!_posRatings[k].interest, skill: _posRatings[k].skill }));
    if (ratings.length) fd.append('position_ratings', JSON.stringify(ratings));
  }
  try {
    const r = await fetch(`/api/emp-docs/${TOKEN}/submit`, { method:'POST', body: fd });
    const d = await r.json();
    if (d.success) { show('screenSuccess'); }
    else { showErr(d.error || t('errUpload')); btn.disabled=false; btn.textContent=t('btnSubmit'); }
  } catch(e) { showErr(t('errNetwork')); btn.disabled=false; btn.textContent=t('btnSubmit'); }
}

function showErr(msg) { const el=document.getElementById('errMsg'); el.textContent=msg; el.style.display='block'; }
function hideErr() { document.getElementById('errMsg').style.display='none'; }

init();
</script>
</body>
</html>
