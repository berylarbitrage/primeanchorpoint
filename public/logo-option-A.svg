<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Option A: Anchor + Upward Peak — "Anchored Excellence" -->
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5BA0"/>
      <stop offset="100%" stop-color="#0F2B5B"/>
    </linearGradient>
  </defs>
  <rect width="240" height="240" rx="40" fill="url(#gA)"/>
  <!-- Anchor body -->
  <circle cx="120" cy="72" r="16" fill="none" stroke="#fff" stroke-width="8"/>
  <line x1="120" y1="88" x2="120" y2="172" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Anchor arms (curved flukes) -->
  <path d="M120 172 Q120 188 100 196" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <path d="M120 172 Q120 188 140 196" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="92" y1="128" x2="148" y2="128" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Upward arrow / prime peak -->
  <path d="M120 72 L120 40" stroke="#F5A623" stroke-width="8" stroke-linecap="round"/>
  <path d="M108 52 L120 38 L132 52" fill="none" stroke="#F5A623" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
